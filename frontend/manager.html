<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GeoTraverse | Manager Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; transition: background 0.3s; font-size: 14px; }
        
        .sidebar { background: #1e40af; position: fixed; width: 280px; height: 100vh; overflow-y: auto; z-index: 30; transition: left 0.3s; }
        .main-content { margin-left: 280px; }
        @media (max-width: 768px) { .sidebar { left: -280px; } .sidebar.mobile-open { left: 0; } .main-content { margin-left: 0; } }
        
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 10px; color: white; cursor: pointer; transition: all 0.2s; }
        .nav-item:hover { background: rgba(255,255,255,0.15); }
        .nav-item.active { background: rgba(255,255,255,0.25); border-left: 3px solid #60a5fa; }
        .nav-item .badge { background: #ef4444; color: white; font-size: 10px; border-radius: 20px; padding: 2px 8px; margin-left: auto; min-width: 20px; text-align: center; }
        .nav-item .badge.hidden { display: none; }
        
        .stat-card { border-radius: 20px; cursor: pointer; text-align: center; padding: 14px 10px; transition: all 0.3s; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0,0,0,0.15); }
        .stat-number { font-size: 18px; font-weight: 800; line-height: 1.2; margin-top: 4px; margin-bottom: 2px; color: white; white-space: nowrap; overflow-x: auto; }
        .stat-label { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.85); text-transform: uppercase; letter-spacing: 0.5px; }
        .stat-icon { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px auto; background: rgba(255,255,255,0.2); color: white; }
        
        .card-projects { background: linear-gradient(135deg, #1e40af, #1e3a8a); }
        .card-progress { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .card-completed { background: linear-gradient(135deg, #10b981, #059669); }
        .card-netprofit { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        
        .btn-primary { background: linear-gradient(135deg, #1e40af, #1e3a8a); color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 15px rgba(30,64,175,0.4); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); color: white; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; }
        
        .action-btn { padding: 4px 8px; font-size: 10px; border-radius: 4px; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 3px; }
        .action-btn.view { background: #3b82f6; color: white; }
        .action-btn.edit { background: #f59e0b; color: white; }
        .action-btn.delete { background: #ef4444; color: white; }
        .action-btn.restore { background: #10b981; color: white; }
        
        .project-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 20px; }
        .messages-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        @media (max-width: 1024px) { .messages-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 640px) { .messages-grid { grid-template-columns: 1fr; } }
        
        .project-card, .report-card, .message-item {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .project-card:hover, .report-card:hover, .message-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
            border-color: #1e40af;
        }
        .project-unviewed { background: #eff6ff; border-left: 4px solid #1e40af; }
        .message-unread { background: #eff6ff; border-left: 4px solid #1e40af; }
        
        .card-header { padding: 12px 14px; color: white; font-weight: bold; background: #1e40af; }
        .card-header h4 { font-weight: bold; margin: 0; font-size: 14px; }
        .card-header p { font-size: 9px; opacity: 0.8; margin: 2px 0 0; }
        
        .new-badge { 
            position: absolute; top: 8px; right: 8px; background: #ef4444; color: white; 
            border-radius: 16px; padding: 2px 8px; font-size: 8px; font-weight: bold; z-index: 10;
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        .project-image { width: 100%; height: 160px; object-fit: cover; cursor: pointer; }
        .no-image { width: 100%; height: 160px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; color: #9ca3af; flex-direction: column; }
        
        .delete-conv-btn { position: absolute; top: 8px; right: 8px; background: #ef4444; color: white; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0.7; transition: all 0.2s; z-index: 15; font-size: 10px; }
        .message-item:hover .delete-conv-btn { opacity: 1; }
        
        .employees-table-container, .data-table-container { background: white; border-radius: 14px; overflow-x: auto; border: 1px solid #e5e7eb; }
        .employees-table, .data-table { width: 100%; border-collapse: collapse; min-width: 700px; font-size: 12px; }
        .employees-table th, .data-table th { background: linear-gradient(135deg, #1e40af, #1e3a8a); color: white; padding: 12px; font-weight: 600; text-align: left; }
        .employees-table td, .data-table td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; }
        .data-table .text-right { text-align: right; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; border-radius: 20px; width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; padding: 20px; }
        
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; font-size: 13px; border: 1.5px solid #e5e7eb; border-radius: 8px; background: white; transition: all 0.2s; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: #1e40af; box-shadow: 0 0 0 3px rgba(30,64,175,0.1); }
        
        .status-badge { padding: 3px 8px; border-radius: 16px; font-size: 10px; font-weight: 500; display: inline-block; }
        .status-pending { background: #fef3c7; color: #d97706; }
        .status-progress { background: #dbeafe; color: #2563eb; }
        .status-completed { background: #d1fae5; color: #059669; }
        .status-paid { background: #d1fae5; color: #059669; }
        .status-partial { background: #fed7aa; color: #ea580c; }
        
        .chat-container { display: flex; flex-direction: column; height: 450px; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #f9fafb; border-radius: 12px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .chat-message-wrapper { display: flex; align-items: flex-start; margin-bottom: 8px; }
        .justify-end { justify-content: flex-end; }
        .justify-start { justify-content: flex-start; }
        .chat-sent .chat-bubble { background: #1e40af; color: white; border-radius: 16px 16px 4px 16px; }
        .chat-received .chat-bubble { background: #e5e7eb; color: #333; border-radius: 16px 16px 16px 4px; }
        .chat-bubble { padding: 8px 12px; word-wrap: break-word; }
        .chat-time { font-size: 9px; opacity: 0.7; margin-top: 3px; display: block; }
        
        .send-dropdown { position: relative; display: inline-block; }
        .send-dropdown-content { display: none; position: absolute; right: 0; top: 100%; background: #1e293b; min-width: 160px; border-radius: 8px; z-index: 100; border: 1px solid #334155; max-height: 280px; overflow-y: auto; margin-top: 4px; }
        .send-dropdown-content a { display: block; padding: 8px 12px; text-decoration: none; color: #ffffff !important; font-size: 11px; cursor: pointer; border-bottom: 1px solid #334155; }
        .send-dropdown-content a:last-child { border-bottom: none; }
        .send-dropdown-content a:hover { background-color: #334155; }
        .dropdown-trigger { background: #8b5cf6; color: white; padding: 5px 10px; border-radius: 5px; font-size: 10px; font-weight: 500; border: none; cursor: pointer; }
        
        .search-results-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); z-index: 50; max-height: 350px; overflow-y: auto; display: none; }
        .search-results-dropdown.active { display: block; }
        .search-result-item { padding: 10px 12px; border-bottom: 1px solid #e5e7eb; cursor: pointer; transition: background 0.2s; font-size: 12px; }
        .search-result-item:hover { background-color: #f3f4f6; }
        .search-highlight { background: #fef3c7 !important; border-left: 3px solid #f59e0b !important; }
        
        .scroll-top { position: fixed; bottom: 20px; right: 20px; background: #1e40af; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; transition: all 0.3s; z-index: 99; color: white; }
        .scroll-top.visible { opacity: 1; }
        
        .section { display: block; }
        .section.hidden { display: none; }
        
        .connection-status { position: fixed; bottom: 10px; right: 10px; background: #1f2937; color: #10b981; padding: 6px 12px; border-radius: 8px; font-size: 10px; z-index: 9999; display: flex; align-items: center; gap: 8px; }
        .auto-refresh-badge { position: fixed; bottom: 10px; left: 10px; background: #1f2937; color: #60a5fa; padding: 4px 12px; border-radius: 20px; font-size: 10px; z-index: 9999; display: flex; align-items: center; gap: 6px; }
        
        .color-option { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; display: inline-block; margin: 4px; }
        .color-option.selected { border-color: white; box-shadow: 0 0 0 2px #333; }
        
        .full-image-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-direction: column; }
        .full-image-modal img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .close-full-btn { position: absolute; top: 20px; right: 30px; color: white; font-size: 36px; cursor: pointer; font-weight: bold; }
        
        .recycle-bin-item { background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px; border-left: 4px solid #f59e0b; }
        
        body.dark-mode { background: #0f172a; }
        body.dark-mode .bg-white, body.dark-mode .project-card, body.dark-mode .report-card, 
        body.dark-mode .message-item, body.dark-mode .modal-content, body.dark-mode .employees-table-container,
        body.dark-mode .data-table-container, body.dark-mode .recycle-bin-item { background: #1e293b; border-color: #334155; color: #f1f5f9; }
        body.dark-mode .sidebar { background: #1e3a8a; }
        body.dark-mode .form-group label { color: #94a3b8; }
        body.dark-mode .form-group input, body.dark-mode .form-group select, body.dark-mode .form-group textarea { background: #0f172a; border-color: #334155; color: #f1f5f9; }
        
        .income-row { background-color: #f0fdf4; }
        .expense-row { background-color: #fef2f2; }
        .pending-row { background-color: #fef3c7; }
        .partial-row { background-color: #fffbeb; }
        body.dark-mode .income-row { background-color: #064e3b20; }
        body.dark-mode .expense-row { background-color: #7f1d1d20; }
        
        .money-input { text-align: left; font-family: monospace; font-weight: 500; }
        .detail-buttons { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 15px; padding-top: 12px; border-top: 1px solid #e5e7eb; }
    </style>
</head>
<body>

<div id="mobileMenuOverlay" class="fixed inset-0 bg-black/50 z-20 hidden" onclick="closeMobileSidebar()"></div>
<div id="fullImageModal" class="full-image-modal hidden" onclick="if(event.target===this) closeFullImageModal()">
    <span class="close-full-btn" onclick="closeFullImageModal()">&times;</span>
    <img id="fullImage" class="max-w-[90%] max-h-[90%] object-contain" src="">
</div>
<div id="connectionStatus" class="connection-status"><i class="fas fa-spinner fa-spin"></i> Connecting...</div>
<div id="autoRefreshBadge" class="auto-refresh-badge"><i class="fas fa-sync-alt fa-fw"></i> <span id="refreshCountdown">5</span>s</div>

<div class="flex">
    <aside id="mainSidebar" class="sidebar text-white">
        <div class="p-4 border-b border-white/30">
            <div class="flex items-center gap-3">
                <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" alt="GeoTraverse Logo" class="w-10 h-10 object-contain rounded-lg" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%231e40af%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2240%22 font-weight=%22bold%22%3EG%3C/text%3E%3C/svg%3E'">
                <div><span class="text-lg font-bold">GeoTraverse</span><p class="text-[9px] text-white/70">MANAGER ERP</p></div>
            </div>
        </div>
        <nav class="flex-1 p-3 space-y-1">
            <div class="nav-item active" data-page="dashboard"><i class="fas fa-tachometer-alt w-5"></i><span>Dashboard</span></div>
            <div class="nav-item" data-page="projects"><i class="fas fa-tasks w-5"></i><span>Projects</span></div>
            <div class="nav-item" data-page="budget"><i class="fas fa-wallet w-5"></i><span>Budget</span></div>
            <div class="nav-item" data-page="messages"><i class="fas fa-envelope w-5"></i><span>Messages</span><span id="msgBadge" class="badge hidden">0</span></div>
            <div class="nav-item" data-page="reports"><i class="fas fa-chart-line w-5"></i><span>Reports</span><span id="reportBadge" class="badge hidden">0</span></div>
            <div class="nav-item" data-page="settings"><i class="fas fa-cog w-5"></i><span>Settings</span></div>
        </nav>
        <div class="p-3 border-t border-white/30">
            <button id="logoutBtn" class="w-full bg-red-600/90 hover:bg-red-600 py-1.5 rounded-lg text-xs transition">Logout</button>
        </div>
    </aside>
    
    <main class="flex-1 main-content">
        <header class="bg-white shadow-sm px-4 py-2 sticky top-0 z-10 flex justify-between items-center border-b">
            <div class="flex items-center gap-3">
                <button id="mobileMenuBtn" class="md:hidden text-gray-600 text-lg"><i class="fas fa-bars"></i></button>
                <button id="homeBtn" class="text-blue-600 text-lg"><i class="fas fa-home"></i></button>
            </div>
            <div class="relative w-full max-w-md">
                <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-xs"></i>
                <input type="text" id="searchInput" placeholder="Search projects, budget, reports..." class="w-full pl-9 pr-3 py-1.5 border rounded-lg text-sm">
                <div id="searchResultsDropdown" class="search-results-dropdown"></div>
            </div>
            <div class="flex items-center gap-3">
                <button id="darkModeBtn" class="text-gray-500 hover:text-gray-700"><i id="darkIcon" class="fas fa-moon text-lg"></i></button>
                <div class="w-7 h-7 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-sm">GM</div>
            </div>
        </header>
        
        <div id="dashboardPage" class="section p-4"></div>
        <div id="projectsPage" class="section p-4 hidden"></div>
        <div id="budgetPage" class="section p-4 hidden"></div>
        <div id="messagesPage" class="section p-4 hidden"></div>
        <div id="reportsPage" class="section p-4 hidden"></div>
        <div id="settingsPage" class="section p-4 hidden"></div>
    </main>
</div>

<!-- MODALS -->
<div id="projectModal" class="modal"><div class="modal-content"><h3 class="text-xl font-bold mb-4"><i class="fas fa-plus-circle text-blue-600 mr-2"></i>Add/Edit Project</h3><input type="hidden" id="projId"><div class="form-group"><label>Project Name *</label><input type="text" id="projName" required></div><div class="form-group"><label>Client Name</label><input type="text" id="projClient"></div><div class="form-group"><label>Amount (TZS)</label><input type="text" id="projAmount" class="money-input"></div><div class="form-group"><label>Location</label><input type="text" id="projLocation"></div><div class="form-group"><label>Description</label><textarea id="projDesc" rows="2"></textarea></div><div class="form-group"><label>Status</label><select id="projStatus"><option>pending</option><option>in_progress</option><option>completed</option><option>approved</option></select></div><div class="form-group"><label>Progress (%)</label><input type="number" id="projProgress" min="0" max="100"></div><div class="form-group"><label>Start Date</label><input type="date" id="projStartDate"></div><div class="form-group"><label>End Date</label><input type="date" id="projEndDate"></div><div class="form-group"><label>Project Image</label><div id="projImageUploadArea" class="border-2 border-dashed border-gray-300 rounded-lg p-3 text-center cursor-pointer hover:border-blue-500" onclick="document.getElementById('projImageFile').click()"><i class="fas fa-cloud-upload-alt text-xl text-gray-400 mb-1"></i><p class="text-xs">Click to upload image</p></div><input type="file" id="projImageFile" accept="image/*" class="hidden"><div id="projImagePreviewContainer" class="hidden mt-2"><img id="projImagePreview" class="w-full h-24 object-cover rounded border"><button type="button" onclick="removeProjectImage()" class="mt-1 text-red-500 text-xs w-full py-1 bg-red-50 rounded">Remove</button></div></div><div class="flex gap-3"><button onclick="saveProject()" class="flex-1 btn-primary py-1.5 rounded">Save</button><button onclick="closeModal('projectModal')" class="flex-1 bg-gray-200 py-1.5 rounded">Cancel</button></div></div></div>

<div id="viewProjectModal" class="modal"><div class="modal-content"><h3 class="text-xl font-bold mb-4"><i class="fas fa-folder-open text-blue-600 mr-2"></i>Project Details</h3><div id="viewProjContent"></div><div id="viewProjButtons" class="detail-buttons"></div><button onclick="closeModal('viewProjectModal')" class="w-full bg-gray-200 py-2 rounded-lg mt-3">Close</button></div></div>

<div id="transactionModal" class="modal"><div class="modal-content"><h3 class="text-xl font-bold mb-4"><i class="fas fa-plus-circle text-blue-600 mr-2"></i>Add/Edit Transaction</h3><input type="hidden" id="transId"><div class="form-group"><label>Type</label><select id="transType"><option>income</option><option>expense</option></select></div><div class="form-group"><label>Source *</label><input type="text" id="transSource" required></div><div class="form-group"><label>Amount (TZS) *</label><input type="text" id="transAmount" class="money-input" required></div><div class="form-group"><label>Transaction Date</label><input type="date" id="transDate"></div><div class="form-group"><label>Status</label><select id="transStatus"><option>paid</option><option>pending</option><option>partial</option></select></div><div class="form-group partial-field hidden" id="paidAmountGroup"><label>Paid Amount (TZS)</label><input type="text" id="transPaidAmount" class="money-input"></div><div class="form-group"><label>Description</label><textarea id="transDesc" rows="2"></textarea></div><div class="flex gap-3"><button onclick="saveTransaction()" class="flex-1 btn-primary py-1.5 rounded">Save</button><button onclick="closeModal('transactionModal')" class="flex-1 bg-gray-200 py-1.5 rounded">Cancel</button></div></div></div>

<div id="viewTransactionModal" class="modal"><div class="modal-content"><h3 class="text-xl font-bold mb-4"><i class="fas fa-receipt text-blue-600 mr-2"></i>Transaction Details</h3><div id="viewTransContent"></div><button onclick="closeModal('viewTransactionModal')" class="w-full bg-gray-200 py-2 rounded-lg mt-3">Close</button></div></div>

<div id="reportModal" class="modal"><div class="modal-content"><h3 class="text-xl font-bold mb-4"><i class="fas fa-chart-line text-purple-600 mr-2"></i>Add Report</h3><input type="hidden" id="reportId"><div class="form-group"><label>Title *</label><input type="text" id="reportTitle" required></div><div class="form-group"><label>Period</label><select id="reportPeriod"><option>weekly</option><option>monthly</option><option>quarterly</option><option>annual</option></select></div><div class="form-group"><label>Content *</label><textarea id="reportContent" rows="5" required></textarea></div><div class="flex gap-3"><button onclick="saveReport()" class="flex-1 btn-primary py-1.5 rounded">Save</button><button onclick="closeModal('reportModal')" class="flex-1 bg-gray-200 py-1.5 rounded">Cancel</button></div></div></div>

// ==================== MONEY FORMATTING ====================
function formatNumberWithCommas(num) {
    if (num === null || num === undefined || isNaN(num)) return '0';
    let parts = num.toString().split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ',');
    return parts.join('.');
}

function formatMoneyInput(input) {
    let value = input.value.replace(/,/g, '');
    if (!isNaN(value) && value !== '') {
        let num = parseFloat(value);
        if (!isNaN(num)) input.value = formatNumberWithCommas(num);
    }
}

function parseMoneyValue(value) {
    if (!value) return 0;
    return parseFloat(String(value).replace(/,/g, '')) || 0;
}

function formatMoney(amount) {
    let num = parseFloat(amount) || 0;
    return "TZS " + formatNumberWithCommas(num);
}

function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function formatDate(d) { if (!d) return 'N/A'; return new Date(d).toLocaleDateString('en-GB'); }
function formatDateTime(d) { if (!d) return 'N/A'; return new Date(d).toLocaleString(); }
function openModal(id) { 
    document.getElementById(id).style.display = 'flex'; 
    document.body.style.overflow = 'hidden'; 
}
function closeModal(id) { 
    document.getElementById(id).style.display = 'none'; 
    document.body.style.overflow = 'auto'; 
}
function closeMobileSidebar() { 
    document.getElementById("mainSidebar").classList.remove("mobile-open"); 
    document.getElementById("mobileMenuOverlay").classList.add("hidden"); 
}
function closeFullImageModal() {

}
function showFullImage(src) {

function showToast(msg, isError) { 
    let t = document.createElement('div'); 
    t.className = 'fixed bottom-20 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg shadow-lg z-[9999] text-xs';

// ==================== API CALLS ====================
async function apiCall(endpoint, method = 'GET', data = null) {
    try {
        const url = API_BASE + endpoint;
        const opts = { method, headers: { 'Content-Type': 'application/json' }, credentials: 'include' };
        if (data && method !== 'GET') opts.body = JSON.stringify(data);
        const res = await fetch(url, opts);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
    } catch(e) {
        console.error('API Error:', endpoint, e);
        return { success: false, message: e.message, data: [] };
    }
}

async function updateConnectionStatus() {
    const statusDiv = document.getElementById('connectionStatus');
    try {
        const res = await apiCall('get_departments.php');
        if (res.success) {
            statusDiv.innerHTML = `<i class="fas fa-check-circle"></i> Connected to Database`;
            statusDiv.style.color = "#10b981";
        } else {
            statusDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> API Error`;
            statusDiv.style.color = "#f59e0b";
        }
    } catch (error) {
        statusDiv.innerHTML = `<i class="fas fa-plug"></i> Offline - Using LocalStorage`;
        statusDiv.style.color = "#ef4444";
    }
}

// ==================== AUTO REFRESH ====================
function startAutoRefresh() {
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(() => {
        const page = document.querySelector('.nav-item.active')?.getAttribute('data-page') || 'dashboard';
        if (!document.querySelector('.modal[style*="display: flex"]')) {
            refreshCurrentPage(page);
        }
        resetCountdown();
    }, 5000);
}

function refreshCurrentPage(page) {
    if (page === 'dashboard') loadDashboard();
    else if (page === 'projects') loadProjects();
    else if (page === 'budget') loadBudget();
    else if (page === 'messages') loadMessages();
    else if (page === 'reports') loadReports();
    else if (page === 'settings') loadSettings();
}

function startCountdownDisplay() {
    if (countdownInterval) clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
        if (countdownSeconds <= 1) countdownSeconds = 5;
        else countdownSeconds--;
        const span = document.getElementById('refreshCountdown');
        if (span) span.innerText = countdownSeconds;
    }, 1000);
}
function resetCountdown() { countdownSeconds = 5; }

async function loadRecycleBinFromDB() {

        recycleBinData = res.data.filter(item => item.deleted_by_department_id === DEPARTMENT_ID || item.deleted_by_admin === 1);

            await loadRecycleBinFromDB();
            loadSettings();
        } else { showToast(res.message || 'Failed', true); }

}

async function emptyRecycleBin() {
    if (confirm('Empty entire recycle bin?')) {

        if (res.success) {
            showToast('Recycle bin emptied');

}

        if (unreadCount > 0) {

async function loadProjects(highlightId = null) {

        projectsData = res.data.filter(p => p.deleted_by_department !== 1 && p.deleted_by_admin !== 1).sort((a,b) => b.id - a.id);
    } else { projectsData = []; }
    
    let html = `<div class="flex justify-between flex-wrap gap-3 mb-4"><h2 class="text-lg font-bold"><i class="fas fa-tasks text-green-600 mr-2"></i>Projects (${projectsData.length})</h2><button onclick="openModal('projectModal')" class="btn-primary"><i class="fas fa-plus mr-1"></i> Add Project</button></div><div class="project-grid" id="projectsGrid"></div>`;
    document.getElementById('projectsPage').innerHTML = html;
    
    if (projectsData.length === 0) {
        document.getElementById('projectsGrid').innerHTML = '<div class="col-span-3 text-center py-8 text-gray-400 bg-white rounded-lg">No projects found</div>';
        return;
    }
    
    let projectsHtml = '';
    for (let p of projectsData) {
        const isUnviewed = p.sent_from_dept && p.sent_from_dept !== DEPARTMENT_ID && p.is_viewed_by_department === 0;
        let imageUrl = null;
        if (p.image && p.image !== '') {
            if (p.image.startsWith('http')) imageUrl = p.image;
            else if (p.image.startsWith('data:')) imageUrl = p.image;
            else imageUrl = '../frontend/assets/uploads/projects/' + p.image;
        }
        projectsHtml += `<div class="project-card ${isUnviewed ? 'project-unviewed' : ''}" id="proj-card-${p.id}" onclick="viewProjectDetails(${p.id})">
            <div class="card-header"><h4>${escapeHtml(p.name)}</h4><p>ID: #${p.id}</p></div>
            ${isUnviewed ? '<div class="new-badge">NEW</div>' : ''}
            ${imageUrl ? `<img src="${imageUrl}?t=${Date.now()}" class="project-image" onclick="event.stopPropagation(); showFullImage('${imageUrl}')" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23f3f4f6%22/%3E%3Ctext x=%2250%22 y=%2255%22 text-anchor=%22middle%22 fill=%22%239ca3af%22%3ENo Image%3C/text%3E%3C/svg%3E'">` : '<div class="no-image"><i class="fas fa-image text-3xl"></i><p class="text-[10px] mt-1">No Image</p></div>'}
            <div class="p-3">
                <div class="flex justify-between items-start"><p class="text-[10px] text-gray-500">Client: ${escapeHtml(p.client_name || 'N/A')}</p><span class="px-1.5 py-0.5 text-[8px] rounded-full ${p.status === 'pending' ? 'status-pending' : p.status === 'in_progress' ? 'status-progress' : 'status-completed'}">${p.status}</span></div>
                <p class="text-sm font-semibold text-blue-600 mt-1">${formatMoney(p.amount)}</p>
                <p class="text-[10px] text-gray-500">Location: ${escapeHtml(p.location || 'N/A')}</p>
                <div class="mt-2"><div class="flex justify-between text-[9px]"><span>Progress</span><span>${p.progress || 0}%</span></div><div class="w-full bg-gray-200 rounded-full h-1"><div class="bg-blue-600 h-1 rounded-full" style="width:${p.progress || 0}%"></div></div></div>
                <div class="flex gap-1 mt-2 pt-1 border-t"><button onclick="event.stopPropagation(); viewProjectDetails(${p.id})" class="action-btn view"><i class="fas fa-eye"></i> View</button><button onclick="event.stopPropagation(); editProject(${p.id})" class="action-btn edit"><i class="fas fa-edit"></i> Edit</button><button onclick="event.stopPropagation(); deleteProject(${p.id})" class="action-btn delete"><i class="fas fa-trash"></i> Del</button></div>
            </div>
        </div>`;
    }
    document.getElementById('projectsGrid').innerHTML = projectsHtml;
    if (highlightId) { const el = document.getElementById(`proj-card-${highlightId}`); if(el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('ring-2', 'ring-yellow-400'); setTimeout(() => el.classList.remove('ring-2', 'ring-yellow-400'), 2000); } }
}

    if (res.success) {

        if (project) project.is_viewed_by_department = 1;
        loadProjects();
        showToast('Project marked as viewed');

}

function getFullImageUrl(imagePath) {
    if (!imagePath || imagePath === '') return null;
    if (imagePath.startsWith('http')) return imagePath;
    if (imagePath.startsWith('data:')) return imagePath;
    return '../frontend/assets/uploads/projects/' + imagePath;
}

function getImageAsBase64(file) {
    return new Promise((resolve) => {
        if (!file || !(file instanceof File)) { resolve(''); return; }
        if (file.size > 2 * 1024 * 1024) { showToast('Image too large. Max 2MB', true); resolve(''); return; }
        let reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => { showToast('Error reading image', true); resolve(''); };
        reader.readAsDataURL(file);
    });
}

async function saveProject() {
    let id = document.getElementById('projId').value;
    let name = document.getElementById('projName').value.trim();
    if (!name) { showToast('Project name required', true); return; }
    let img = await getImageAsBase64(currentProjectImageFile);
    let data = {
        name: name, client_name: document.getElementById('projClient').value,
        amount: parseMoneyValue(document.getElementById('projAmount').value),
        location: document.getElementById('projLocation').value,

async function loadBudget(highlightId = null) {
    const res = await apiCall(`get_transactions.php?department_id=${DEPARTMENT_ID}`);
    if (res.success && res.data) {
        transactionsData = res.data.filter(t => t.is_deleted !== 1).sort((a,b) => new Date(b.transaction_date) - new Date(a.transaction_date));
    } else { transactionsData = []; }
    
    let totalIncome = 0, totalExpense = 0, totalPending = 0;
    for (let t of transactionsData) {
        const amount = parseFloat(t.amount) || 0;
        const paidAmount = parseFloat(t.paid_amount) || 0;
        if (t.type === 'income') {
            if (t.status === 'paid') totalIncome += amount;
            else if (t.status === 'partial') { totalIncome += paidAmount; totalPending += (amount - paidAmount); }
            else totalPending += amount;
        } else if (t.type === 'expense') {
            if (t.status === 'paid') totalExpense += amount;
            else if (t.status === 'partial') totalExpense += paidAmount;
        }
    }
    const netProfit = totalIncome - totalExpense;
    
    let html = `<div class="flex justify-between flex-wrap gap-3 mb-3"><h2 class="text-lg font-bold"><i class="fas fa-exchange-alt text-blue-600 mr-2"></i>Budget Management (${transactionsData.length})</h2><div class="flex gap-2"><button onclick="openModal('transactionModal')" class="btn-primary"><i class="fas fa-plus mr-1"></i> Add Transaction</button><button onclick="exportBudgetToExcel()" class="btn-success"><i class="fas fa-file-excel mr-1"></i> Excel</button><button onclick="exportBudgetToPDF()" class="btn-danger"><i class="fas fa-file-pdf mr-1"></i> PDF</button></div></div>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-3">
            <div class="bg-green-50 p-2 text-center rounded-lg"><p class="text-[9px] text-gray-500 uppercase">Income</p><p class="text-md font-bold text-green-600">${formatMoney(totalIncome)}</p></div>
            <div class="bg-red-50 p-2 text-center rounded-lg"><p class="text-[9px] text-gray-500 uppercase">Expenses</p><p class="text-md font-bold text-red-600">${formatMoney(totalExpense)}</p></div>
            <div class="bg-blue-50 p-2 text-center rounded-lg"><p class="text-[9px] text-gray-500 uppercase">Net Profit</p><p class="text-md font-bold ${netProfit >= 0 ? 'text-blue-600' : 'text-red-600'}">${formatMoney(netProfit)}</p></div>
            <div class="bg-orange-50 p-2 text-center rounded-lg"><p class="text-[9px] text-gray-500 uppercase">Pending</p><p class="text-md font-bold text-orange-600">${formatMoney(totalPending)}</p></div>
        </div>
        <div class="data-table-container overflow-x-auto">
            <table class="data-table min-w-[800px]">
                <thead><tr><th>Date</th><th>Type</th><th>Source</th><th class="text-right">Amount</th><th>Paid</th><th>Status</th><th class="text-center">Actions</th></tr></thead>
                <tbody>`;
    for (let t of transactionsData) {
        let statusClass = t.status === 'paid' ? 'status-paid' : (t.status === 'partial' ? 'status-partial' : 'status-pending');
        let paidAmount = parseFloat(t.paid_amount) || (t.status === 'paid' ? parseFloat(t.amount) : 0);
        const isHighlighted = highlightId && t.id === highlightId;
        html += `<tr id="trans-row-${t.id}" class="${isHighlighted ? 'search-highlight' : ''} ${t.type === 'income' ? 'income-row' : 'expense-row'}"><td class="p-2">${t.transaction_date}</td><td class="p-2"><span class="status-badge ${t.type === 'income' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${t.type}</span></td><td class="p-2 font-medium">${escapeHtml(t.source)}</td><td class="text-right ${t.type === 'income' ? 'text-green-600' : 'text-red-600'} font-bold">${formatMoney(t.amount)}</td><td class="text-right text-blue-600">${formatMoney(paidAmount)}</td><td class="p-2"><span class="status-badge ${statusClass}">${t.status}</span></td><td class="text-center"><div class="flex gap-1 justify-center"><button onclick="viewTransaction(${t.id})" class="action-btn view"><i class="fas fa-eye"></i></button><button onclick="editTransaction(${t.id})" class="action-btn edit"><i class="fas fa-edit"></i></button><button onclick="deleteTransaction(${t.id})" class="action-btn delete"><i class="fas fa-trash"></i></button></div></td></tr>`;
    }
    html += `</tbody></div>`;
    document.getElementById('budgetPage').innerHTML = html;
    if (highlightId) { const el = document.getElementById(`trans-row-${highlightId}`); if(el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); setTimeout(() => el.classList.remove('search-highlight'), 2000); } }
}

        transaction_date: document.getElementById('transDate').value || new Date().toISOString().split('T')[0],
        status: document.getElementById('transStatus').value,
        description: document.getElementById('transDesc').value,
        department_id: DEPARTMENT_ID
    };
    if (data.status === 'partial') data.paid_amount = parseMoneyValue(document.getElementById('transPaidAmount').value);
    if (!data.source || data.amount <= 0) { showToast('Source and valid amount required', true); return; }
    let url = isUpdate ? 'update_transaction.php' : 'add_transaction.php';
    if (isUpdate) data.id = parseInt(id);
    let res = await apiCall(url, 'POST', data);
    if (res && res.success) {
        showToast(isUpdate ? 'Transaction updated' : 'Transaction added');
        closeModal('transactionModal');
        loadBudget();
        loadDashboard();
    } else showToast((res && res.message) || 'Failed', true);
}

async function deleteTransaction(id) {
    if (confirm('Delete this transaction?')) {
        const trans = transactionsData.find(t => t.id === id);
        if (trans) await addToRecycleBin(id, 'transaction', trans.source);
        let res = await apiCall('delete_transaction.php', 'DELETE', { id: parseInt(id), department_id: DEPARTMENT_ID, is_admin: 0 });
        if (res.success) {
            showToast('Transaction deleted');
            loadBudget();
            loadDashboard();
        } else showToast(res.message || 'Failed', true);
    }
}

// ==================== MESSAGES ====================
async function loadMessages(highlightId = null) {
    try {
        const res = await apiCall(`get_conversations.php?department_id=${DEPARTMENT_ID}`);
        messagesData = (res.success && res.data) ? res.data : [];
    } catch(e) { messagesData = []; }
    updateMessageBadge();
    
    let html = `<div class="flex flex-wrap justify-between items-center gap-3 mb-3"><h2 class="text-lg font-bold"><i class="fas fa-envelope text-blue-600 mr-2"></i>Messages (${messagesData.length} conversations)</h2><button onclick="openModal('msgModal')" class="btn-primary"><i class="fas fa-paper-plane mr-1"></i> New Message</button></div><div class="messages-grid" id="messagesGridContainer"></div>`;
    document.getElementById('messagesPage').innerHTML = html;
    
    if (messagesData.length === 0) {
        document.getElementById('messagesGridContainer').innerHTML = '<div class="col-span-3 text-center py-8 text-gray-400 bg-white rounded-lg">No messages found.</div>';
        return;
    }
    
    let msgsHtml = '';
    for (let conv of messagesData) {
        const isUnread = conv.unread_count > 0;
        const preview = conv.last_message ? (conv.last_message.substring(0, 70) + (conv.last_message.length > 70 ? '...' : '')) : 'No messages';
        const otherDeptName = conv.other_department_name || 'Department';
        const otherDeptId = conv.other_department_id || 1;
        const icon = departmentIcons[otherDeptId] || 'fa-building';
        const color = departmentColors[otherDeptId] || '#1e40af';
        const isHighlighted = highlightId && conv.conversation_id === highlightId;
        
        msgsHtml += `<div class="message-item ${isUnread ? 'message-unread' : ''} ${isHighlighted ? 'search-highlight' : ''}" id="msg-card-${conv.conversation_id}" onclick="openChat(${conv.conversation_id})">
            <div class="delete-conv-btn" onclick="event.stopPropagation(); deleteConversation(${conv.conversation_id})"><i class="fas fa-trash-alt"></i></div>
            <div class="card-header"><h4>${escapeHtml(otherDeptName)}</h4><p>${isUnread ? `${conv.unread_count} new` : 'Conversation'}</p></div>
            <div class="p-3"><div class="flex justify-between items-center mb-1"><span class="text-[9px] text-gray-400">${conv.last_message_time ? formatDateTime(conv.last_message_time) : ''}</span></div><p class="text-xs text-gray-600">${escapeHtml(preview)}</p></div>
        </div>`;
    }
    document.getElementById('messagesGridContainer').innerHTML = msgsHtml;
    if (highlightId) { const el = document.getElementById(`msg-card-${highlightId}`); if(el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); setTimeout(() => el.classList.remove('search-highlight'), 3000); } }
    updateMessageBadge();
}

async function deleteConversation(conversationId) {
    if (confirm('Delete this conversation?')) {
        const conv = messagesData.find(c => c.conversation_id === conversationId);
        if (conv) await addToRecycleBin(conversationId, 'conversation', conv.other_department_name || 'Conversation');
        const res = await apiCall('delete_conversation.php', 'POST', { conversation_id: conversationId, department_id: DEPARTMENT_ID });
        if (res && res.success) {
            showToast('Conversation deleted');
            messagesData = messagesData.filter(c => c.conversation_id !== conversationId);
            loadMessages();
            if (currentConversationId === conversationId) { closeModal('chatModal'); currentConversationId = null; }
        } else { showToast(res?.message || 'Failed', true); }
    }
}

async function deleteMessage(messageId) {
    if (confirm('Delete this message?')) {
        const res = await apiCall('delete_message.php', 'POST', { message_id: messageId, department_id: DEPARTMENT_ID });
        if (res && res.success) {
            showToast('Message deleted');
            if (currentConversationId) await openChat(currentConversationId);
            loadMessages();
        } else { showToast(res?.message || 'Failed', true); }
    }
}

// Tafuta function hii kwenye manager dashboard na uibadilishe
async function sendNewMessage() {
    const departmentId = document.getElementById('msgTo').value;
    const msg = document.getElementById('msgContent').value;
    
    console.log("Manager sendNewMessage - departmentId:", departmentId, "msg:", msg);
    
    if (!departmentId) {
        showToast('Please select a department', true);
        return;
    }
    if (!msg.trim()) {
        showToast('Please enter a message', true);
        return;
    }
    
    const sendBtn = document.querySelector('#msgModal .btn-primary');
    const originalText = sendBtn.innerHTML;
    sendBtn.innerHTML = '<span class="loading-spinner"></span> Sending...';
    sendBtn.disabled = true;
    
    try {
        // Tumia sender_dept na receiver_dept
        const payload = {
            sender_dept: DEPARTMENT_ID,  // Manager department = 4
            receiver_dept: parseInt(departmentId),
            message: msg.trim(),
            subject: 'New Message from Manager'
        };
        
        console.log("Sending payload:", payload);
        
        const res = await apiCall('send_message.php', 'POST', payload);
        
        console.log("API Response:", res);
        
        if (res && res.success) {
            showToast('✅ Message sent to ' + (res.data?.to_department_name || 'Department'));
            closeModal('msgModal');
            document.getElementById('msgContent').value = '';
            await loadMessages();
        } else {
            showToast('❌ ' + (res?.message || 'Failed to send message'), true);
        }
    } catch (error) {
        console.error("Send error:", error);
        showToast('❌ Network error: ' + error.message, true);
    } finally {
        sendBtn.innerHTML = originalText;
        sendBtn.disabled = false;
    }
}

async function openChat(conversationId) {
    currentConversationId = conversationId;
    const conv = messagesData.find(c => c.conversation_id === conversationId);
    const otherDeptName = conv ? conv.other_department_name : "Department";
    document.getElementById('chatModalTitle').innerHTML = `<i class="fas fa-comments text-blue-500 mr-2"></i>Chat with ${escapeHtml(otherDeptName)}`;
    
    const res = await apiCall(`get_messages.php?conversation_id=${conversationId}&department_id=${DEPARTMENT_ID}`);
    if (res.success && res.data) {
        const msgs = res.data;
        let chatHtml = '';
        for (let m of msgs) {
            const isSent = (m.sender_dept == DEPARTMENT_ID);
            chatHtml += `<div class="chat-message-wrapper ${isSent ? 'justify-end' : 'justify-start'}">
                <div class="chat-message ${isSent ? 'chat-sent' : 'chat-received'}">
                    <div class="chat-bubble">${!isSent ? `<div class="text-[9px] opacity-75 mb-1 font-semibold">${escapeHtml(departmentNames[m.sender_dept] || m.sender_name)}</div>` : ''}<div class="text-sm">${escapeHtml(m.message)}</div><span class="chat-time">${new Date(m.created_at).toLocaleString()}</span></div>
                </div>
                <button onclick="event.stopPropagation(); deleteMessage(${m.id})" class="delete-msg-btn bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-[9px] ml-1 opacity-0 hover:opacity-100 transition"><i class="fas fa-trash-alt"></i></button>
            </div>`;
        }
        document.getElementById('chatMessagesArea').innerHTML = chatHtml;
        document.getElementById('chatMessagesArea').scrollTop = document.getElementById('chatMessagesArea').scrollHeight;
        openModal('chatModal');
        if (conv && conv.unread_count > 0) {
            await apiCall('mark_conversation_read.php', 'POST', { conversation_id: conversationId, department_id: DEPARTMENT_ID });
            await loadMessages();
        }
    } else { openModal('chatModal'); }
}

// ==================== REPORTS ====================
async function loadReports(highlightId = null) {
    const res = await apiCall(`get_reports.php?department_id=${DEPARTMENT_ID}`);
    if (res.success && res.data) {
        reportsData = res.data.filter(r => r.deleted_by_department !== 1 && r.deleted_by_admin !== 1).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
        unviewedReportsCount = reportsData.filter(r => r.sent_from_department && r.sent_from_department !== DEPARTMENT_ID && r.is_viewed_by_department === 0).length;
    } else { reportsData = []; unviewedReportsCount = 0; }
    updateReportBadge();
    
    let html = `<div class="flex flex-wrap justify-between items-center gap-3 mb-3"><h2 class="text-lg font-bold"><i class="fas fa-chart-line text-purple-600 mr-2"></i>Reports (${reportsData.length})</h2><div class="flex gap-2 flex-wrap"><button onclick="openModal('reportModal')" class="btn-primary"><i class="fas fa-plus mr-1"></i> Add Report</button><button onclick="exportAllReportsToExcel()" class="btn-success"><i class="fas fa-file-excel mr-1"></i> Excel All</button><button onclick="exportAllReportsToPDF()" class="btn-danger"><i class="fas fa-file-pdf mr-1"></i> PDF All</button></div></div><div class="report-grid" id="reportsGrid"></div>`;

        return;
    }
    
    let reportsHtml = '';
    for (let r of reportsData) {
        const isUnviewed = r.sent_from_department && r.sent_from_department !== DEPARTMENT_ID && r.is_viewed_by_department === 0;
        const isHighlighted = highlightId && r.id === highlightId;
        reportsHtml += `<div class="report-card ${isUnviewed ? 'report-unviewed' : ''} ${isHighlighted ? 'search-highlight' : ''}" id="report-card-${r.id}" onclick="viewReportDetails(${r.id})">
            <div class="card-header"><h4>${escapeHtml(r.title)}</h4><p>${r.period} report</p></div>${isUnviewed ? '<div class="new-badge">NEW</div>' : ''}
            <div class="p-3"><div class="flex justify-between items-center mb-1"><span class="text-[9px] text-gray-400">${formatDate(r.created_at)}</span><span class="status-badge ${r.status === 'sent' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${r.status === 'sent' ? 'Sent' : 'Draft'}</span></div>
            <div class="mt-1 text-[10px] text-gray-600 line-clamp-2">${escapeHtml(r.content?.substring(0, 100) || '')}${r.content?.length > 100 ? '...' : ''}</div>
            <div class="flex gap-1 mt-2 pt-1 border-t"><button onclick="event.stopPropagation(); viewReportDetails(${r.id})" class="action-btn view"><i class="fas fa-eye"></i></button><button onclick="event.stopPropagation(); editReport(${r.id})" class="action-btn edit"><i class="fas fa-edit"></i></button><button onclick="event.stopPropagation(); deleteReport(${r.id})" class="action-btn delete"><i class="fas fa-trash"></i></button></div></div>
        </div>`;
    }
    document.getElementById('reportsGrid').innerHTML = reportsHtml;
    if (highlightId) { const el = document.getElementById(`report-card-${highlightId}`); if(el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); setTimeout(() => el.classList.remove('search-highlight'), 3000); } }
}

async function markReportAsViewed(reportId) {
    const res = await apiCall('mark_report_viewed.php', 'POST', { report_id: reportId, department_id: DEPARTMENT_ID, is_admin: 0 });
    if (res.success) {
        unviewedReportsCount = Math.max(0, unviewedReportsCount - 1);
        updateReportBadge();
        const report = reportsData.find(r => r.id === reportId);
        if (report) report.is_viewed_by_department = 1;
        loadReports();
        loadDashboard();
        showToast('Report marked as viewed');
    }
}

        }
        let deptOptions = '';
        allDepartmentsForSend.forEach(d => {

        });
        
        const modalHtml = `<div id="reportDetailModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-[1000] p-3" onclick="if(event.target===this) this.remove()">
            <div class="bg-gray-900 rounded-xl max-w-2xl w-full max-h-[85vh] overflow-y-auto shadow-xl border border-gray-700">
                <div class="sticky top-0 bg-gray-800 px-4 py-2 border-b border-gray-700 flex justify-between items-center"><h3 class="text-md font-bold text-white"><i class="fas fa-file-alt text-purple-500 mr-2"></i>${escapeHtml(r.title)}</h3><button onclick="this.closest('#reportDetailModal').remove()" class="text-gray-400 hover:text-gray-200 text-xl">&times;</button></div>

                <div class="bg-gray-800 rounded-lg p-3 mb-3 border border-gray-700"><div class="whitespace-pre-wrap text-gray-200 leading-relaxed text-xs">${escapeHtml(r.content)}</div></div>
                <div class="flex flex-wrap gap-2 justify-end pt-2 border-t border-gray-700"><button onclick="exportSingleReportExcel(${r.id}); document.getElementById('reportDetailModal')?.remove()" class="btn-success text-white px-3 py-1 rounded text-xs"><i class="fas fa-file-excel mr-1"></i>Excel</button><button onclick="exportSingleReportPDF(${r.id}); document.getElementById('reportDetailModal')?.remove()" class="btn-danger text-white px-3 py-1 rounded text-xs"><i class="fas fa-file-pdf mr-1"></i>PDF</button><div class="send-dropdown relative inline-block"><button class="dropdown-trigger" onclick="toggleSendDropdown('reportSendDropdown-${r.id}')"><i class="fas fa-paper-plane mr-1"></i>Send</button><div id="reportSendDropdown-${r.id}" class="send-dropdown-content absolute right-0 mt-1 bg-gray-800 border border-gray-700 rounded-lg shadow-lg hidden z-50 min-w-[150px]">${deptOptions}</div></div></div></div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }
}

async function sendReportToDept(reportId, deptId) {
    const r = reportsData.find(r => r.id === reportId);
    if (r) {
        const msg = `📊 REPORT FROM MANAGER:\nTitle: ${r.title}\nPeriod: ${r.period}\n\n${r.content?.substring(0, 300) || ''}`;
        const res = await apiCall('send_message.php', 'POST', { sender_dept: DEPARTMENT_ID, receiver_dept: deptId, message: msg, subject: `Report: ${r.title}` });
        if (res && res.success) {
            showToast(`Report "${r.title}" sent to ${departmentNames[deptId]}`);
            r.status = 'sent';
            await loadReports();
        } else { showToast(res?.message || 'Failed to send report', true); }
        toggleSendDropdown(`reportSendDropdown-${reportId}`);
        document.getElementById('reportDetailModal')?.remove();
    }
}

function exportSingleReportExcel(reportId) {
    const r = reportsData.find(r => r.id === reportId);
    if (r) {
        let ws = [['Title', 'Period', 'Content', 'Created', 'Department']];
        ws.push([r.title, r.period, r.content, formatDate(r.created_at), departmentNames[r.department_id] || 'Manager']);
        let wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(ws), 'Report');
        XLSX.writeFile(wb, `report_${r.id}.xlsx`);
        showToast('Exported to Excel');
    }
}

function editReport(id) {
    const r = reportsData.find(r => r.id === id);
    if (r) {
        document.getElementById('reportId').value = r.id;
        document.getElementById('reportTitle').value = r.title;
        document.getElementById('reportPeriod').value = r.period;
        document.getElementById('reportContent').value = r.content;
        openModal('reportModal');
    }
}

async function saveReport() {
    let id = document.getElementById('reportId').value;
    let data = {
        title: document.getElementById('reportTitle').value,
        period: document.getElementById('reportPeriod').value,
        content: document.getElementById('reportContent').value,
        department_id: DEPARTMENT_ID
    };
    if (!data.title || !data.content) { showToast('Title and content required', true); return; }
    let res = id ? await apiCall('update_report.php', 'POST', { ...data, id: parseInt(id) }) : await apiCall('add_report.php', 'POST', data);
    if (res.success) {
        showToast(id ? 'Report updated' : 'Report added');
        closeModal('reportModal');
        loadReports();
        loadDashboard();
    } else { showToast(res.message || 'Failed', true); }
}

async function deleteReport(id) {
    if (confirm('Delete this report?')) {
        const rep = reportsData.find(r => r.id === id);
        if (rep) await addToRecycleBin(id, 'report', rep.title);
        let res = await apiCall('delete_report.php', 'POST', { report_id: id, department_id: DEPARTMENT_ID, is_admin: 0 });
        if (res.success) {
            showToast('Report deleted');
            reportsData = reportsData.filter(r => r.id !== id);
            loadReports();
            loadDashboard();
        } else { showToast(res.message || 'Failed', true); }
    }
}

// ==================== SETTINGS ====================
function loadSettings() {
    const darkMode = document.body.classList.contains('dark-mode');
    let logsHtml = activityLogs.slice(0, 15).map(l => `<div class="text-[10px] border-b py-1"><span>${escapeHtml(l.action)}</span><span class="float-right text-gray-400">${new Date(l.created_at).toLocaleString()}</span></div>`).join('');
    
    let recycleHtml = `<div class="bg-white rounded-lg p-4 shadow-sm border mt-4"><div class="flex justify-between items-center mb-3"><h3 class="font-semibold text-sm"><i class="fas fa-trash-restore text-orange-500 mr-2"></i>Recycle Bin (${recycleBinData.length} items)</h3><button onclick="emptyRecycleBin()" class="btn-danger text-xs px-2 py-1 rounded">Empty Bin</button></div>`;
    if (recycleBinData.length === 0) {
        recycleHtml += `<div class="text-center py-6 text-gray-400 text-xs"><i class="fas fa-trash-alt text-2xl mb-1 opacity-30"></i><p>Recycle bin is empty</p></div>`;
    } else {
        recycleHtml += `<div class="space-y-2 max-h-64 overflow-y-auto">`;
        recycleBinData.forEach(item => {
            const icon = item.item_type === 'project' ? 'fa-tasks' : item.item_type === 'transaction' ? 'fa-exchange-alt' : item.item_type === 'report' ? 'fa-chart-line' : 'fa-comments';
            recycleHtml += `<div class="recycle-bin-item flex justify-between items-center p-2 bg-gray-50 rounded-lg"><div class="flex items-center gap-2"><i class="fas ${icon} text-gray-500 text-xs"></i><div><p class="font-medium text-xs">${escapeHtml(item.item_name)}</p><p class="text-[8px] text-gray-500">${item.item_type} · Deleted: ${new Date(item.deleted_at).toLocaleString()}</p></div></div><div class="flex gap-1"><button onclick="restoreFromRecycleBin(${item.id})" class="action-btn restore text-[9px] px-1 py-0.5"><i class="fas fa-trash-restore"></i></button><button onclick="permanentlyDeleteItem(${item.id})" class="action-btn delete text-[9px] px-1 py-0.5"><i class="fas fa-trash-alt"></i></button></div></div>`;
        });
        recycleHtml += `</div>`;
    }
    recycleHtml += `</div>`;
    
    document.getElementById('settingsPage').innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="bg-white rounded-lg p-4 shadow-sm border"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-palette text-purple-500 mr-2"></i>Appearance</h3><div class="space-y-3"><div class="flex justify-between items-center"><span class="text-sm"><i class="fas fa-moon mr-2 text-blue-500"></i> Dark Mode</span><label class="relative inline-flex items-center cursor-pointer"><input type="checkbox" id="darkModeToggle" class="sr-only peer" ${darkMode ? 'checked' : ''}><div class="w-10 h-5 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-blue-600"></div></label></div><div><span class="text-sm"><i class="fas fa-palette mr-2 text-green-500"></i> Sidebar Color</span><div class="flex flex-wrap gap-2 mt-2" id="colorOptionsContainer"></div></div></div></div>
        <div class="bg-white rounded-lg p-4 shadow-sm border"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-shield-alt text-red-500 mr-2"></i>Security</h3><div class="flex justify-between items-center"><span class="text-sm"><i class="fas fa-key mr-2 text-blue-500"></i> Change Password</span><button onclick="openModal('pwdModal')" class="bg-blue-600 text-white px-3 py-1 rounded text-xs">Change</button></div></div>
        <div class="bg-white rounded-lg p-4 shadow-sm border"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-history mr-2 text-blue-600"></i>Activity Logs</h3><div class="max-h-32 overflow-y-auto text-xs border rounded-lg p-2 bg-gray-50">${logsHtml}</div><button onclick="clearLogs()" class="w-full mt-2 bg-red-600 text-white py-1.5 rounded-lg text-xs">Clear Logs</button></div>
        <div class="bg-white rounded-lg p-4 shadow-sm border"><h3 class="font-semibold text-sm mb-3"><i class="fas fa-info-circle text-indigo-500 mr-2"></i>System Information</h3><div class="space-y-1 text-xs"><div class="flex justify-between"><span>Total Projects:</span><span class="font-semibold">${projectsData.length}</span></div><div class="flex justify-between"><span>Total Transactions:</span><span class="font-semibold">${transactionsData.length}</span></div><div class="flex justify-between"><span>System Version:</span><span class="font-semibold">2.1.0</span></div></div></div>
    </div>${recycleHtml}`;
    
    const container = document.getElementById('colorOptionsContainer');
    if (container) {
        container.innerHTML = '';
        sidebarColorOptions.forEach(c => {
            const isSelected = localStorage.getItem('sidebar_color') === c;
            container.innerHTML += `<div class="color-option ${isSelected ? 'selected' : ''}" style="background: ${c}" onclick="changeSidebarColor('${c}', this)"></div>`;
        });
    }
    document.getElementById('darkModeToggle')?.addEventListener('change', e => {
        document.body.classList.toggle('dark-mode', e.target.checked);
        localStorage.setItem('dark_mode', e.target.checked);
        const icon = document.getElementById('darkIcon');
        if (icon) icon.className = e.target.checked ? 'fas fa-sun text-lg' : 'fas fa-moon text-lg';
    });
}

function changeSidebarColor(color, el) {
    document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('mainSidebar').style.background = color;
    localStorage.setItem('sidebar_color', color);
    showToast('Sidebar color changed');
}

async function changePassword() {
    let oldPwd = document.getElementById('oldPwd').value;
    let newPwd = document.getElementById('newPwd').value;
    let confirmPwd = document.getElementById('confirmPwd').value;
    if (!newPwd) { showToast('Enter new password', true); return; }
    if (newPwd.length < 4) { showToast('Password must be at least 4 characters', true); return; }
    if (newPwd !== confirmPwd) { showToast('Passwords do not match', true); return; }
    let res = await apiCall('change_password.php', 'POST', { department_id: DEPARTMENT_ID, current_password: oldPwd, new_password: newPwd });
    if (res.success) {
        showToast('Password changed');
        closeModal('pwdModal');
        document.getElementById('oldPwd').value = '';
        document.getElementById('newPwd').value = '';
        document.getElementById('confirmPwd').value = '';
    } else showToast(res.message || 'Failed', true);
}

function createBackup() {
    const backup = {
        version: "2.1.0",
        generated: new Date().toISOString(),
        department_id: DEPARTMENT_ID,
        department_name: "Manager",
        data: { projects: projectsData, transactions: transactionsData, reports: reportsData, messages: messagesData, activityLogs: activityLogs }
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `manager_backup_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup created successfully');
    closeModal('backupModal');
}

function restoreBackup() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/json';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = async (evt) => {
            try {
                const data = JSON.parse(evt.target.result);
                if (data.data) {
                    if (data.data.projects) projectsData = data.data.projects;
                    if (data.data.transactions) transactionsData = data.data.transactions;
                    if (data.data.reports) reportsData = data.data.reports;
                    if (data.data.activityLogs) activityLogs = data.data.activityLogs;
                    showToast("Backup restored! Reloading...");
                    setTimeout(() => location.reload(), 1500);
                }
            } catch (err) { showToast("Invalid backup file", true); }
        };
        reader.readAsText(file);
    };
    input.click();
    closeModal('backupModal');
}

// ==================== SEARCH ====================
function performGlobalSearch() {
    const term = document.getElementById('searchInput').value.toLowerCase().trim();
    const dropdown = document.getElementById('searchResultsDropdown');
    if (!term) { dropdown.classList.remove('active'); return; }
    
    let html = '';
    const projResults = projectsData.filter(p => p.name.toLowerCase().includes(term));
    if (projResults.length) {
        html += '<div class="p-2 bg-gray-100 text-xs font-semibold">📋 PROJECTS</div>';
        projResults.slice(0,3).forEach(p => {
            html += `<div class="search-result-item" onclick="showPageAndHighlight('projects', ${p.id}, 'proj-card-${p.id}')"><div class="font-medium">${escapeHtml(p.name)}</div><div class="text-xs text-gray-500">${formatMoney(p.amount)}</div></div>`;
        });
    }
    const transResults = transactionsData.filter(t => t.source?.toLowerCase().includes(term));
    if (transResults.length) {
        html += '<div class="p-2 bg-gray-100 text-xs font-semibold">💰 BUDGET</div>';
        transResults.slice(0,3).forEach(t => {
            html += `<div class="search-result-item" onclick="showPageAndHighlight('budget', ${t.id}, 'trans-row-${t.id}')"><div class="font-medium">${escapeHtml(t.source)}</div><div class="text-xs text-gray-500">${formatMoney(t.amount)}</div></div>`;
        });
    }
    const reportResults = reportsData.filter(r => r.title?.toLowerCase().includes(term));
    if (reportResults.length) {
        html += '<div class="p-2 bg-gray-100 text-xs font-semibold">📊 REPORTS</div>';
        reportResults.slice(0,3).forEach(r => {
            html += `<div class="search-result-item" onclick="showPageAndHighlight('reports', ${r.id}, 'report-card-${r.id}')"><div class="font-medium">${escapeHtml(r.title)}</div><div class="text-xs text-gray-500">${r.period}</div></div>`;
        });
    }
    if (!html) html = '<div class="p-3 text-center text-gray-400 text-xs">No results found</div>';
    dropdown.innerHTML = html;
    dropdown.classList.add('active');
}

function showPageAndHighlight(page, id, elementId) {
    document.getElementById('searchResultsDropdown').classList.remove('active');
    document.getElementById('searchInput').value = '';
    showPage(page, id);
    setTimeout(() => {
        const element = document.getElementById(elementId);
        if (element) {
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
            element.classList.add('search-highlight');
            setTimeout(() => element.classList.remove('search-highlight'), 2000);
        }
    }, 500);
}

function toggleSendDropdown(dropdownId) {
    const dropdown = document.getElementById(dropdownId);
    document.querySelectorAll('.send-dropdown-content').forEach(d => { if (d.id !== dropdownId) d.style.display = 'none'; });
    if (dropdown) dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
}

let activityLogs = [{ action: "Manager Dashboard initialized", created_at: new Date().toISOString() }];
function clearLogs() {
    if (confirm("Clear all activity logs?")) {
        activityLogs = [{ action: "Logs cleared", created_at: new Date().toISOString() }];
        loadSettings();
        showToast("Logs cleared");
    }
}

function showPage(pageId, highlightId = null) {
    const sections = ['dashboardPage', 'projectsPage', 'budgetPage', 'messagesPage', 'reportsPage', 'settingsPage'];
    sections.forEach(s => { const el = document.getElementById(s); if (el) el.classList.add('hidden'); });
    document.getElementById(`${pageId}Page`).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    const activeNav = document.querySelector(`.nav-item[data-page="${pageId}"]`);
    if (activeNav) activeNav.classList.add('active');
    
    if (pageId === 'dashboard') loadDashboard();
    else if (pageId === 'projects') loadProjects(highlightId);
    else if (pageId === 'budget') loadBudget(highlightId);
    else if (pageId === 'messages') loadMessages(highlightId);
    else if (pageId === 'reports') loadReports(highlightId);
    else if (pageId === 'settings') loadSettings();
}

function initScrollTop() {
    let btn = document.createElement('div');
    btn.className = 'scroll-top';
    btn.innerHTML = '<i class="fas fa-arrow-up"></i>';
    document.body.appendChild(btn);
    btn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    window.addEventListener('scroll', () => btn.classList.toggle('visible', window.scrollY > 300));
}

async function init() {
    await loadDepartmentsForDropdowns();
    await loadRecycleBinFromDB();
    
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => showPage(item.getAttribute('data-page')));
    });
    document.getElementById('homeBtn')?.addEventListener('click', () => showPage('dashboard'));
    document.getElementById('searchInput')?.addEventListener('input', performGlobalSearch);
    document.getElementById('mobileMenuBtn')?.addEventListener('click', () => {
        document.getElementById('mainSidebar').classList.add('mobile-open');
        document.getElementById('mobileMenuOverlay').classList.remove('hidden');
    });
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        if (confirm('Are you sure you want to logout?')) {
            if (refreshInterval) clearInterval(refreshInterval);
            if (countdownInterval) clearInterval(countdownInterval);
            window.location.href = 'login_system.html';
        }
    });
    
    const savedColor = localStorage.getItem('sidebar_color');
    if (savedColor) document.getElementById('mainSidebar').style.background = savedColor;
    if (localStorage.getItem('dark_mode') === 'true') {
        document.body.classList.add('dark-mode');
        const icon = document.getElementById('darkIcon');
        if (icon) icon.className = 'fas fa-sun text-lg';
    }
    
    initScrollTop();
    startAutoRefresh();
    startCountdownDisplay();
    showPage('dashboard');
    updateConnectionStatus();
    setInterval(updateConnectionStatus, 30000);
}
