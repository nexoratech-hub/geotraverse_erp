<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GeoTraverse | Bricks & Timber ERP - Enhanced Dashboard</title>
    <link rel="icon" type="image/png" href="https://i.postimg.cc/MT6jTVHh/weblogo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f0f2f5; transition: 0.3s; font-size: 14px; }
        .sidebar { background: #b45309; transition: 0.3s; height: 100vh; overflow-y: auto; position: fixed; width: 280px; z-index: 30; }
        .main-content { margin-left: 280px; }
        .nav-item { transition: 0.2s; cursor: pointer; display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 10px; color: white; }
        .nav-item.active { background: rgba(255,255,255,0.15); border-left: 3px solid #fbbf24; }
        .stat-card { transition: 0.3s; border-radius: 20px; cursor: pointer; padding: 14px; text-align: center; color: white; background: linear-gradient(135deg, #b45309, #92400e); }
        .btn-primary { background: linear-gradient(135deg, #b45309, #92400e); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(3px); }
        .modal-content { background: white; border-radius: 24px; width: 90%; max-width: 800px; max-height: 85vh; overflow-y: auto; }
        .status-paid { background: #d1fae5; color: #059669; padding: 4px 12px; border-radius: 30px; font-size: 11px; font-weight: 600; }
        .status-partial { background: #fef3c7; color: #d97706; }
        .status-pending { background: #fee2e2; color: #dc2626; }
        .request-table-container { overflow-x: auto; border-radius: 16px; border: 1px solid #e5e7eb; background: white; }
        .request-table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1000px; }
        .request-table th { background: #b45309; color: white; padding: 12px; font-weight: 600; }
        .request-table td { padding: 10px 8px; border-bottom: 1px solid #e5e7eb; }
        .project-work-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .project-work-table th { background: #f3f4f6; padding: 8px; text-align: left; }
        .partial-input { width: 100px; padding: 4px; border: 1px solid #ccc; border-radius: 6px; font-size: 11px; }
        .reports-header-cards { display: flex; gap: 16px; margin-bottom: 24px; }
        .report-card-item { background: white; border-radius: 20px; padding: 14px; cursor: pointer; transition: 0.2s; border: 1px solid #e5e7eb; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .report-card-item:hover { transform: translateY(-3px); border-color: #b45309; box-shadow: 0 12px 20px -12px rgba(0,0,0,0.15); }
        .badge-new { background: #ef4444; color: white; border-radius: 30px; padding: 2px 10px; font-size: 9px; margin-left: 8px; }
        body.dark-mode .request-table-container, body.dark-mode .modal-content, body.dark-mode .report-card-item { background: #1e293b; border-color: #334155; }
        body.dark-mode .request-table td { border-color: #334155; }
        body.dark-mode .project-work-table th { background: #334155; color: #f1f5f9; }
        @media (max-width:768px){ .sidebar { left: -280px; } .sidebar.mobile-open { left: 0; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>
<div id="connectionStatus" class="fixed bottom-3 right-3 bg-gray-800 text-green-400 text-[9px] px-3 py-1 rounded-full z-50 flex items-center gap-2"><i class="fas fa-check-circle"></i> Live</div>
<div id="fullImageModal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-[2000]" onclick="if(event.target===this) closeFullImage()"><span class="absolute top-5 right-8 text-white text-3xl cursor-pointer" onclick="closeFullImage()">&times;</span><img id="fullImageView" class="max-w-[90%] max-h-[90%] object-contain"></div>

<div class="flex h-screen overflow-hidden">
    <aside id="sidebar" class="sidebar shadow-xl flex flex-col">
        <div class="px-5 py-5 border-b border-white/20"><div class="flex items-center gap-3"><div class="w-10 h-10 rounded-xl bg-amber-800 flex items-center justify-center"><img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" class="w-8 h-8"></div><div><span class="text-lg font-bold text-white">GeoTraverse</span><p class="text-[9px] text-white/50">BRICKS & TIMBER ERP</p></div></div></div>
        <div class="flex-1 overflow-y-auto px-3 py-4">
            <div class="space-y-1">
                <div class="text-white/40 text-[10px] px-3 uppercase">MAIN</div>
                <a href="#" class="nav-item active" data-section="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
                <a href="#" class="nav-item" data-section="bricks"><i class="fas fa-cubes"></i><span>Bricks Projects</span></a>
                <a href="#" class="nav-item" data-section="timber"><i class="fas fa-tree"></i><span>Timber Projects</span></a>
                <a href="#" class="nav-item" data-section="requests"><i class="fas fa-hand-holding-usd"></i><span>Requests</span><span id="requestBadge" class="badge hidden">0</span></a>
                <a href="#" class="nav-item" data-section="reports"><i class="fas fa-chart-line"></i><span>Reports</span></a>
                <a href="#" class="nav-item" data-section="settings"><i class="fas fa-cog"></i><span>Settings</span></a>
            </div>
        </div>
        <div class="p-4 border-t border-white/20"><button id="logoutBtn" class="w-full bg-red-600/80 hover:bg-red-600 text-white py-2 rounded-lg text-xs"><i class="fas fa-sign-out-alt mr-1"></i>Logout</button></div>
    </aside>

    <main class="flex-1 overflow-y-auto main-content">
        <header class="bg-white shadow-sm px-5 py-3 sticky top-0 z-10 flex justify-between items-center"><div class="flex items-center gap-3"><button id="mobileMenuBtn" class="md:hidden text-gray-600 text-xl"><i class="fas fa-bars"></i></button><h1 class="text-lg font-bold">Bricks & Timber ERP</h1></div><div class="flex gap-3"><button id="darkModeToggle" class="bg-gray-100 p-2 rounded-full"><i id="darkIcon" class="fas fa-moon"></i></button></div></header>
        <div class="p-5" id="mainContainer"></div>
    </main>
</div>

<!-- REQUEST MODAL with partial payment -->
<div id="requestModal" class="modal"><div class="modal-content"><div class="modal-header bg-amber-700 text-white p-4 flex justify-between"><h3><i class="fas fa-hand-holding-usd"></i> Fund Request / Transaction</h3><button onclick="closeModal('requestModal')">&times;</button></div><div class="modal-body p-5"><input type="hidden" id="reqId"><div class="grid grid-cols-2 gap-3"><div><label>Date *</label><input type="date" id="reqDate" class="w-full border p-2 rounded"></div><div><label>Type</label><select id="reqType" class="w-full border p-2 rounded"><option value="income">Income</option><option value="expense">Expense</option></select></div><div><label>Source/Category</label><input id="reqSource" class="w-full border p-2 rounded" placeholder="e.g., Brick Sales"></div><div><label>Total Amount (TZS)</label><input id="reqAmount" class="w-full border p-2 rounded money-input"></div></div><div><label>Description</label><textarea id="reqDesc" rows="2" class="w-full border p-2 rounded"></textarea></div><div class="mt-3 flex gap-2"><button onclick="submitRequest()" class="btn-primary text-white px-4 py-2 rounded">Save Request</button><button onclick="closeModal('requestModal')" class="bg-gray-300 px-4 py-2 rounded">Cancel</button></div></div></div></div>

<!-- project daily work modal (enhanced) -->
<div id="projectWorkModal" class="modal"><div class="modal-content max-w-5xl"><div class="modal-header bg-amber-700 text-white p-4 flex justify-between"><h3><i class="fas fa-clipboard-list"></i> Production & Sales Record</h3><button onclick="closeModal('projectWorkModal')">&times;</button></div><div class="modal-body p-5"><input type="hidden" id="workProjectId"><input type="hidden" id="workRecordId"><div class="grid grid-cols-2 md:grid-cols-4 gap-3"><div><label>Date/Time</label><input type="datetime-local" id="workDate" class="w-full border p-2 rounded"></div><div><label>Budget (TZS)</label><input type="text" id="workBudget" class="money-input w-full border p-2 rounded"></div><div><label>Description</label><input type="text" id="workDesc" class="w-full border p-2 rounded" placeholder="Production details"></div><div><label>Quantity Produced</label><input type="number" id="workProduced" class="w-full border p-2 rounded" value="0"></div><div><label>Quantity Sold</label><input type="number" id="workSold" class="w-full border p-2 rounded" value="0"></div><div><label>Income (TZS)</label><input type="text" id="workIncome" class="money-input w-full border p-2 rounded"></div><div><label>Expenses (TZS)</label><input type="text" id="workExpenses" class="money-input w-full border p-2 rounded"></div><div><label>Profit</label><input id="workProfit" class="w-full border p-2 rounded bg-gray-100" readonly></div></div><div class="grid grid-cols-2 gap-3 mt-3"><div><label>Payment Status</label><select id="workPaymentStatus" class="w-full border p-2 rounded"><option value="pending">Pending</option><option value="partial">Partial Paid</option><option value="paid">Fully Paid</option></select></div><div id="partialAmountDiv" style="display:none;"><label>Partial Paid Amount (TZS)</label><input type="text" id="workPartialAmount" class="money-input w-full border p-2 rounded" placeholder="Enter paid amount"></div></div><div class="mt-4 flex gap-2"><button onclick="saveProjectWork()" class="btn-primary text-white px-5 py-2 rounded">Save Record</button><button onclick="closeModal('projectWorkModal')" class="bg-gray-300 px-4 py-2 rounded">Cancel</button></div><hr class="my-4"><div class="overflow-x-auto"><table class="project-work-table w-full text-xs"><thead><tr><th>Date</th><th>Budget</th><th>Desc</th><th>Produced</th><th>Sold</th><th>Income</th><th>Expenses</th><th>Profit</th><th>Payment</th><th>Actions</th></tr></thead><tbody id="projectWorkTableBody"></tbody></table></div></div></div></div>

<script>
// CONFIG
const API_BASE = '../backend/api/';
const DEPT_ID = 6;
let bricksProjects = [], timberProjects = [], allRequests = [], reportsList = [], workRecords = [];
let currentProjectWorkId = null;

function formatMoney(val){ let num=parseFloat(val)||0; return "TZS "+num.toLocaleString(); }
function parseMoney(str){ return parseFloat(String(str).replace(/,/g,''))||0; }
function showToast(msg,err){ let d=document.createElement('div'); d.className=`fixed bottom-5 right-5 ${err?'bg-red-500':'bg-green-500'} text-white px-4 py-2 rounded-lg shadow-lg z-50 text-sm`; d.innerHTML=msg; document.body.appendChild(d); setTimeout(()=>d.remove(),3000);}
function closeModal(id){ document.getElementById(id).style.display='none'; }
function openModal(id){ document.getElementById(id).style.display='flex'; }
async function apiCall(endpoint,method='GET',data=null){ try{ let opts={method,headers:{'Content-Type':'application/json'},credentials:'include'}; if(data&&method!='GET') opts.body=JSON.stringify(data); let res=await fetch(API_BASE+endpoint,opts); if(!res.ok)throw new Error(); return await res.json(); }catch(e){ return {success:false,message:e.message}; }}

// Load data
async function fetchBricks(){ let res=await apiCall(`get_projects.php?department_id=${DEPT_ID}&project_type=bricks`); if(res.success) bricksProjects=res.data.filter(p=>!p.deleted_by_department).sort((a,b)=>b.id-a.id); else bricksProjects=[]; }
async function fetchTimber(){ let res=await apiCall(`get_projects.php?department_id=${DEPT_ID}&project_type=timber`); if(res.success) timberProjects=res.data.filter(p=>!p.deleted_by_department).sort((a,b)=>b.id-a.id); else timberProjects=[]; }
async function fetchRequests(){ let res=await apiCall(`get_transactions.php?department_id=${DEPT_ID}`); if(res.success) allRequests=res.data.filter(t=>t.department_id===DEPT_ID&&!t.is_deleted).sort((a,b)=>new Date(b.transaction_date)-new Date(a.transaction_date)); else allRequests=[]; }
async function fetchReports(){ let res=await apiCall(`get_reports.php?department_id=${DEPT_ID}`); reportsList=(res.success&&res.data)?res.data.filter(r=>!r.deleted_by_department):[]; }
async function fetchWorkRecords(){ let res=await apiCall(`get_dailywork.php?department_id=${DEPT_ID}`); workRecords=(res.success&&res.data)?res.data.filter(w=>!w.is_deleted):[]; }

// DASHBOARD
async function loadDashboard(){
    await Promise.all([fetchBricks(),fetchTimber(),fetchRequests(),fetchWorkRecords()]);
    let totalIncome=0,totalExpense=0; allRequests.forEach(r=>{if(r.type==='income'&&r.status==='paid') totalIncome+=parseMoney(r.amount); if(r.type==='expense'&&r.status==='paid') totalExpense+=parseMoney(r.amount);});
    let html=`<div class="mb-5"><h2 class="text-2xl font-bold">Bricks & Timber Dashboard</h2></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6"><div class="stat-card"><i class="fas fa-cubes text-xl"></i><p class="text-xl font-bold mt-1">${bricksProjects.length}</p><p class="text-xs">Bricks Projects</p></div><div class="stat-card" style="background:linear-gradient(135deg,#047857,#065f46);"><i class="fas fa-tree"></i><p class="text-xl font-bold">${timberProjects.length}</p><p class="text-xs">Timber Projects</p></div><div class="stat-card" style="background:linear-gradient(135deg,#059669,#047857);"><i class="fas fa-arrow-down"></i><p class="text-xl font-bold">${formatMoney(totalIncome)}</p><p class="text-xs">Total Income</p></div><div class="stat-card" style="background:linear-gradient(135deg,#dc2626,#b91c1c);"><i class="fas fa-arrow-up"></i><p class="text-xl font-bold">${formatMoney(totalExpense)}</p><p class="text-xs">Expenses</p></div></div><div class="grid grid-cols-3 gap-3 mb-5"><button onclick="openAddProjectModal('bricks')" class="bg-amber-700 text-white py-2 rounded">+ Bricks Project</button><button onclick="openAddProjectModal('timber')" class="bg-emerald-700 text-white py-2 rounded">+ Timber Project</button><button onclick="openModal('requestModal')" class="bg-orange-600 text-white py-2 rounded">+ Fund Request</button></div>`;
    document.getElementById("dashboardSection").innerHTML=html;
}

// REQUESTS TABLE (restructured)
async function loadRequestsSection(){
    await fetchRequests();
    let html=`<div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold"><i class="fas fa-hand-holding-usd text-amber-600"></i> Fund Requests / Transactions</h2><button onclick="openModal('requestModal')" class="btn-primary text-white px-3 py-1 rounded text-sm">+ New Request</button></div><div class="request-table-container"><table class="request-table"><thead><tr><th>Date</th><th>Type</th><th>Source</th><th>Amount (TZS)</th><th>Paid Amount</th><th>Pending Balance</th><th>Payment Status</th><th>Description</th><th>Actions</th></tr></thead><tbody>`;
    if(allRequests.length===0) html+=`<tr><td colspan="9" class="text-center py-6 text-gray-400">No requests found</td></tr>`;
    else allRequests.forEach(r=>{
        let paidAmt=parseMoney(r.paid_amount||0), total=parseMoney(r.amount), pending=total-paidAmt;
        let statusClass=r.status==='paid'?'status-paid':r.status==='partial'?'status-partial':'status-pending';
        let statusText=r.status==='paid'?'Fully Paid':r.status==='partial'?'Partial':'Pending';
        html+=`<tr><td>${new Date(r.transaction_date).toLocaleDateString()}</td><td><span class="px-2 py-0.5 rounded-full text-xs ${r.type==='income'?'bg-green-100 text-green-700':'bg-red-100 text-red-700'}">${r.type}</span></td><td class="font-medium">${escapeHtml(r.source)}</td><td class="font-semibold">${formatMoney(total)}</td><td>${formatMoney(paidAmt)}</td><td>${formatMoney(pending)}</td><td><span class="${statusClass} px-2 py-0.5 rounded-full text-xs">${statusText}</span></td><td class="max-w-[150px] truncate">${escapeHtml(r.description||'-')}</td><td><div class="flex gap-1"><button onclick="editRequestRecord(${r.id})" class="text-blue-600 text-xs"><i class="fas fa-edit"></i></button><button onclick="viewRequestDetails(${r.id})" class="text-green-600 text-xs"><i class="fas fa-eye"></i></button><button onclick="deleteRequestRecord(${r.id})" class="text-red-600 text-xs"><i class="fas fa-trash"></i></button></div></td></tr>`;
    });
    html+=`</tbody></table></div>`;
    document.getElementById("requestsSection").innerHTML=html;
}
function editRequestRecord(id){ let r=allRequests.find(x=>x.id===id); if(r){ document.getElementById('reqId').value=r.id; document.getElementById('reqDate').value=r.transaction_date; document.getElementById('reqType').value=r.type; document.getElementById('reqSource').value=r.source; document.getElementById('reqAmount').value=r.amount; document.getElementById('reqDesc').value=r.description||''; openModal('requestModal'); } }
async function viewRequestDetails(id){ let r=allRequests.find(x=>x.id===id); if(r){ alert(`📄 REQUEST DETAILS\nType: ${r.type}\nSource: ${r.source}\nAmount: ${formatMoney(r.amount)}\nPaid: ${formatMoney(r.paid_amount||0)}\nPending: ${formatMoney(parseMoney(r.amount)-parseMoney(r.paid_amount||0))}\nStatus: ${r.status}\nDescription: ${r.description||'-'}`); } }
async function deleteRequestRecord(id){ if(confirm("Delete?")){ await apiCall('delete_transaction.php','POST',{id,is_deleted:1}); showToast("Deleted"); await loadRequestsSection(); await loadDashboard(); }}
async function submitRequest(){ let id=document.getElementById('reqId').value; let data={ transaction_date:document.getElementById('reqDate').value||new Date().toISOString().slice(0,10), type:document.getElementById('reqType').value, source:document.getElementById('reqSource').value, amount:parseMoney(document.getElementById('reqAmount').value), description:document.getElementById('reqDesc').value, department_id:DEPT_ID, status:'pending', paid_amount:0, created_by:"Production Manager" }; let res=id?await apiCall('update_transaction.php','POST',{...data,id:parseInt(id)}):await apiCall('add_transaction.php','POST',data); if(res.success){ showToast(id?"Updated":"Added"); closeModal('requestModal'); await loadRequestsSection(); await loadDashboard(); }else showToast(res.message||"Error",true); }

// PROJECTS SECTION (with integrated work table per project)
async function loadBricksProjectsSection(){ await fetchBricks(); renderProjectGrid('bricks',bricksProjects); }
async function loadTimberProjectsSection(){ await fetchTimber(); renderProjectGrid('timber',timberProjects); }
function renderProjectGrid(type,projects){
    let container=document.getElementById(type==='bricks'?'bricksProjectsGrid':'timberProjectsGrid');
    let html=`<div class="flex justify-between mb-4"><h2 class="text-xl font-bold"><i class="fas ${type==='bricks'?'fa-cubes text-amber-600':'fa-tree text-emerald-600'}"></i> ${type==='bricks'?'Bricks':'Timber'} Projects (${projects.length})</h2><button onclick="openAddProjectModal('${type}')" class="btn-primary text-white px-3 py-1 rounded text-sm">+ Add Project</button></div><div class="grid grid-cols-1 md:grid-cols-2 gap-5">`;
    if(projects.length===0) html+=`<div class="col-span-2 text-center py-10 bg-white rounded-xl">No projects yet</div>`;
    else projects.forEach(p=>{
        let imageUrl=p.image?`https://geotraverse.com/assets/uploads/projects/${p.image}`:'';
        html+=`<div class="bg-white rounded-2xl shadow border hover:shadow-md transition p-3"><div class="flex justify-between"><h3 class="font-bold">${escapeHtml(p.name)}</h3><span class="text-xs bg-amber-100 px-2 py-0.5 rounded-full">${p.status}</span></div><p class="text-xs text-gray-500">Client: ${escapeHtml(p.client_name||'-')}</p><p class="text-sm font-semibold text-amber-700 mt-1">${formatMoney(p.amount)}</p><div class="flex gap-2 mt-2"><button onclick="openProjectWorkModal(${p.id},'${escapeHtml(p.name)}')" class="bg-blue-600 text-white text-[10px] px-2 py-1 rounded"><i class="fas fa-chart-line"></i> Production/Sales</button><button onclick="editProject(${p.id},'${type}')" class="bg-amber-600 text-white text-[10px] px-2 py-1 rounded"><i class="fas fa-edit"></i> Edit</button><button onclick="deleteProjectItem(${p.id},'${type}')" class="bg-red-600 text-white text-[10px] px-2 py-1 rounded"><i class="fas fa-trash"></i></button></div></div>`;
    });
    html+=`</div>`;
    if(type==='bricks') document.getElementById("bricksSection").innerHTML=html; else document.getElementById("timberSection").innerHTML=html;
}
async function openProjectWorkModal(projId,projName){
    currentProjectWorkId=projId;
    await fetchWorkRecords();
    let records=workRecords.filter(w=>w.project_id==projId);
    document.getElementById('workProjectId').value=projId;
    document.getElementById('workRecordId').value='';
    document.getElementById('workDate').value=new Date().toISOString().slice(0,16);
    document.getElementById('workBudget').value=''; document.getElementById('workDesc').value=''; document.getElementById('workProduced').value=0; document.getElementById('workSold').value=0;
    document.getElementById('workIncome').value=''; document.getElementById('workExpenses').value=''; document.getElementById('workPaymentStatus').value='pending';
    document.getElementById('partialAmountDiv').style.display='none';
    document.getElementById('workProfit').value='';
    let tbody=document.getElementById('projectWorkTableBody');
    if(records.length===0) tbody.innerHTML='<tr><td colspan="10" class="text-center py-4">No records</td></tr>';
    else{
        let rows='';
        records.forEach(rec=>{
            let profit=parseMoney(rec.income)-parseMoney(rec.expenses);
            rows+=`<tr><td>${new Date(rec.date).toLocaleString()}</td><td>${formatMoney(rec.budget||0)}</td><td>${escapeHtml(rec.work_description||'-')}</td><td>${rec.quantity_produced||0}</td><td>${rec.quantity_sold||0}</td><td>${formatMoney(rec.income)}</td><td>${formatMoney(rec.expenses)}</td><td>${formatMoney(profit)}</td><td><span class="px-1 py-0.5 rounded text-[9px] ${rec.payment_status==='paid'?'bg-green-100 text-green-700':rec.payment_status==='partial'?'bg-yellow-100':'bg-red-100'}">${rec.payment_status||'pending'}</span></td><td><button onclick="editWorkRecord(${rec.id})" class="text-blue-500"><i class="fas fa-edit"></i></button> <button onclick="deleteWorkRecord(${rec.id})" class="text-red-500"><i class="fas fa-trash"></i></button></td></tr>`;
        });
        tbody.innerHTML=rows;
    }
    openModal('projectWorkModal');
}
async function saveProjectWork(){
    let id=document.getElementById('workRecordId').value;
    let projectId=document.getElementById('workProjectId').value;
    let budget=parseMoney(document.getElementById('workBudget').value);
    let income=parseMoney(document.getElementById('workIncome').value);
    let expenses=parseMoney(document.getElementById('workExpenses').value);
    let paymentStatus=document.getElementById('workPaymentStatus').value;
    let partialAmount=paymentStatus==='partial'?parseMoney(document.getElementById('workPartialAmount').value):0;
    let finalPaid=paymentStatus==='paid'?income:paymentStatus==='partial'?partialAmount:0;
    let data={ date:document.getElementById('workDate').value, project_id:projectId, project_name:(bricksProjects.concat(timberProjects).find(p=>p.id==projectId)?.name||''), work_description:document.getElementById('workDesc').value, quantity_produced:parseInt(document.getElementById('workProduced').value)||0, quantity_sold:parseInt(document.getElementById('workSold').value)||0, income:income, expenses:expenses, budget:budget, payment_status:paymentStatus, paid_amount:finalPaid, status:'completed', department_id:DEPT_ID, created_by:"Manager" };
    let res=id?await apiCall('update_dailywork.php','POST',{...data,id:parseInt(id)}):await apiCall('add_dailywork.php','POST',data);
    if(res.success){ showToast("Record saved"); closeModal('projectWorkModal'); await openProjectWorkModal(projectId,''); await loadDashboard(); }
    else showToast("Error",true);
}
async function deleteWorkRecord(id){ if(confirm("Delete?")){ await apiCall('delete_dailywork.php','POST',{id,is_deleted:1}); showToast("Deleted"); await fetchWorkRecords(); if(currentProjectWorkId) await openProjectWorkModal(currentProjectWorkId,''); } }
function editWorkRecord(id){ let rec=workRecords.find(w=>w.id===id); if(rec){ document.getElementById('workRecordId').value=rec.id; document.getElementById('workDate').value=rec.date.slice(0,16); document.getElementById('workBudget').value=rec.budget||0; document.getElementById('workDesc').value=rec.work_description||''; document.getElementById('workProduced').value=rec.quantity_produced||0; document.getElementById('workSold').value=rec.quantity_sold||0; document.getElementById('workIncome').value=rec.income; document.getElementById('workExpenses').value=rec.expenses; document.getElementById('workPaymentStatus').value=rec.payment_status||'pending'; if(rec.payment_status==='partial'){ document.getElementById('partialAmountDiv').style.display='block'; document.getElementById('workPartialAmount').value=rec.paid_amount||0; } else document.getElementById('partialAmountDiv').style.display='none'; let profit=parseMoney(rec.income)-parseMoney(rec.expenses); document.getElementById('workProfit').value=formatNumberWithCommas(profit); openModal('projectWorkModal'); } }
document.getElementById('workPaymentStatus')?.addEventListener('change',function(){ document.getElementById('partialAmountDiv').style.display=this.value==='partial'?'block':'none'; });
document.getElementById('workIncome')?.addEventListener('input',function(){ let inc=parseMoney(this.value), exp=parseMoney(document.getElementById('workExpenses').value); document.getElementById('workProfit').value=formatNumberWithCommas(inc-exp); });
document.getElementById('workExpenses')?.addEventListener('input',function(){ let inc=parseMoney(document.getElementById('workIncome').value), exp=parseMoney(this.value); document.getElementById('workProfit').value=formatNumberWithCommas(inc-exp); });
function formatNumberWithCommas(n){ return n.toLocaleString(); }

function openAddProjectModal(type){ document.getElementById('editProjectId').value=''; document.getElementById('editProjectType').value=type; document.getElementById('projectName').value=''; document.getElementById('projectClient').value=''; document.getElementById('projectAmount').value=''; document.getElementById('projectDesc').value=''; document.getElementById('projectStatus').value='pending'; document.getElementById('projectProgress').value='0'; openModal('projectModal'); }
async function saveProject(){ let id=document.getElementById('editProjectId').value; let type=document.getElementById('editProjectType').value; let data={ name:document.getElementById('projectName').value, client_name:document.getElementById('projectClient').value, amount:parseMoney(document.getElementById('projectAmount').value), description:document.getElementById('projectDesc').value, status:document.getElementById('projectStatus').value, progress:parseInt(document.getElementById('projectProgress').value)||0, department_id:DEPT_ID, project_type:type, created_by:"Manager" }; let res=id?await apiCall('update_project.php','POST',{...data,id}):await apiCall('add_project.php','POST',data); if(res.success){ showToast(id?"Updated":"Added"); closeModal('projectModal'); if(type==='bricks') loadBricksProjectsSection(); else loadTimberProjectsSection(); await loadDashboard(); } }
function editProject(id,type){ let arr=type==='bricks'?bricksProjects:timberProjects; let p=arr.find(x=>x.id===id); if(p){ document.getElementById('editProjectId').value=p.id; document.getElementById('editProjectType').value=type; document.getElementById('projectName').value=p.name; document.getElementById('projectClient').value=p.client_name||''; document.getElementById('projectAmount').value=p.amount; document.getElementById('projectDesc').value=p.description||''; document.getElementById('projectStatus').value=p.status; document.getElementById('projectProgress').value=p.progress; openModal('projectModal'); } }
async function deleteProjectItem(id,type){ if(confirm("Move to recycle bin?")){ await apiCall('delete_project.php','POST',{project_id:id,department_id:DEPT_ID,is_deleted:1}); showToast("Deleted"); if(type==='bricks') loadBricksProjectsSection(); else loadTimberProjectsSection(); await loadDashboard(); } }

// REPORTS SECTION (two cards: Added & Uploaded)
async function loadReportsSection(){
    await fetchReports();
    let myReports=reportsList.filter(r=>r.department_id===DEPT_ID);      // Added (created)
    let receivedReports=reportsList.filter(r=>r.sent_to_department===DEPT_ID && r.department_id!==DEPT_ID); // Uploaded (received)
    let html=`<div class="reports-header-cards"><div class="report-card-item flex-1" onclick="showReportList('added')"><i class="fas fa-plus-circle text-green-600 text-2xl"></i><h3 class="font-bold mt-1">Added Reports</h3><p class="text-2xl font-black">${myReports.length}</p><span class="text-xs">Reports created by you</span></div><div class="report-card-item flex-1" onclick="showReportList('uploaded')"><i class="fas fa-upload text-blue-600 text-2xl"></i><h3 class="font-bold mt-1">Uploaded Reports</h3><p class="text-2xl font-black">${receivedReports.length}</p><span class="text-xs">From other departments</span></div></div><div id="reportsDynamicArea"><div class="flex gap-2 justify-between mb-3"><div class="flex gap-2"><button onclick="openModal('addReportModal')" class="bg-amber-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-plus"></i> Add</button><button onclick="openGenerateReportModal()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-chart-line"></i> Generate</button></div><div><button onclick="exportAllReportsExcel()" class="bg-green-600 text-white px-3 py-1 rounded text-sm"><i class="fas fa-file-excel"></i> Excel All</button><button onclick="exportAllReportsPDF()" class="bg-red-600 text-white px-3 py-1 rounded text-sm ml-2"><i class="fas fa-file-pdf"></i> PDF All</button></div></div><div id="reportListContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div></div>`;
    document.getElementById("reportsSection").innerHTML=html;
    showReportList('added');
}
function showReportList(type){
    let myReports=reportsList.filter(r=>r.department_id===DEPT_ID);
    let received=reportsList.filter(r=>r.sent_to_department===DEPT_ID && r.department_id!==DEPT_ID);
    let data=type==='added'?myReports:received;
    let container=document.getElementById("reportListContainer");
    if(data.length===0){ container.innerHTML=`<div class="col-span-2 text-center py-10 text-gray-400">No reports</div>`; return; }
    let grid='';
    data.forEach(r=>{
        let bgGrad='linear-gradient(135deg, #b45309, #92400e)';
        grid+=`<div class="bg-white rounded-xl shadow border p-4 relative hover:shadow-md"><div style="background:${bgGrad}; height:6px; border-radius:12px;"></div><div class="flex justify-between mt-2"><h3 class="font-bold text-md">${escapeHtml(r.title)}</h3><span class="text-[10px] bg-gray-100 px-2 py-0.5 rounded-full">${r.period}</span></div><p class="text-xs text-gray-500 mt-1">${r.created_at?new Date(r.created_at).toLocaleDateString():''}</p><p class="text-xs line-clamp-2 mt-1">${escapeHtml(r.content?.substring(0,80))}...</p><div class="flex gap-2 mt-3"><button onclick="viewReportFull(${r.id})" class="text-blue-600 text-xs"><i class="fas fa-eye"></i> View</button>${type==='added'?`<button onclick="editReport(${r.id})" class="text-amber-600 text-xs"><i class="fas fa-edit"></i> Edit</button>`:''}<button onclick="deleteReportItem(${r.id})" class="text-red-600 text-xs"><i class="fas fa-trash"></i> Delete</button></div></div>`;
    });
    container.innerHTML=grid;
}
async function viewReportFull(id){ let r=reportsList.find(x=>x.id===id); if(r){ let win=window.open(); win.document.write(`<html><head><title>${r.title}</title><style>body{font-family:sans;padding:20px;background:#f8fafc;} .card{background:white;border-radius:20px;padding:20px;border-top:6px solid #b45309;}</style></head><body><div class="card"><h1>${escapeHtml(r.title)}</h1><p><strong>Period:</strong> ${r.period} | <strong>Date:</strong> ${new Date(r.created_at).toLocaleString()}</p><hr/><pre style="white-space:pre-wrap;font-family:monospace;">${escapeHtml(r.content)}</pre><div style="margin-top:20px;"><button onclick="window.print()" style="background:#b45309;color:white;padding:6px 12px;border:none;border-radius:8px;">Save as PDF</button></div></div></body></html>`); win.document.close(); } }
async function deleteReportItem(id){ if(confirm("Delete report?")){ await apiCall('delete_report.php','POST',{report_id:id,department_id:DEPT_ID,is_deleted:1}); showToast("Deleted"); await loadReportsSection(); } }
async function addReport(){ let title=document.getElementById('newReportTitle').value; let content=document.getElementById('newReportContent').value; let period=document.getElementById('newReportPeriod').value; if(!title||!content){ showToast("Title & content required",true); return; } let res=await apiCall('add_report.php','POST',{title,period,content,department_id:DEPT_ID,status:'draft',created_by:"Manager"}); if(res.success){ showToast("Report added"); closeModal('addReportModal'); await loadReportsSection(); } }
function openGenerateReportModal(){ openModal('generateReportModal'); }
async function generateAndSaveReport(){ let title=document.getElementById('genReportTitle').value||`Report ${new Date().toLocaleString()}`; let period=document.getElementById('genPeriodType').value; let content=`${period.toUpperCase()} REPORT - Generated by Bricks & Timber\nDate: ${new Date().toLocaleString()}\nTotal Projects: ${bricksProjects.length+timberProjects.length}\nRequests: ${allRequests.length}`; let res=await apiCall('add_report.php','POST',{title,period,content,department_id:DEPT_ID,status:'draft',created_by:"Manager"}); if(res.success){ showToast("Generated"); closeModal('generateReportModal'); await loadReportsSection(); }else showToast("Error",true); }
function exportAllReportsExcel(){ let ws=[["ID","Title","Period","Content","Created"]]; reportsList.forEach(r=>ws.push([r.id,r.title,r.period,r.content,r.created_at])); let wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws),"Reports"); XLSX.writeFile(wb,`reports_all.xlsx`); }
function exportAllReportsPDF(){ let win=window.open(); let rows=reportsList.map(r=>`<div style="border:1px solid #ccc;margin-bottom:15px;padding:10px;"><h3>${escapeHtml(r.title)}</h3><p>${escapeHtml(r.content)}</p><small>${r.period}</small></div>`).join(''); win.document.write(`<html><head><title>All Reports</title></head><body><h1>All Reports</h1>${rows}<button onclick="window.print()">Print/PDF</button></body></html>`); win.document.close(); }
function editReport(id){ let r=reportsList.find(x=>x.id===id); if(r){ document.getElementById('editReportId').value=r.id; document.getElementById('editReportTitle').value=r.title; document.getElementById('editReportPeriod').value=r.period; document.getElementById('editReportContent').value=r.content; openModal('editReportModal'); } }
async function updateReport(){ let id=document.getElementById('editReportId').value; let data={title:document.getElementById('editReportTitle').value, period:document.getElementById('editReportPeriod').value, content:document.getElementById('editReportContent').value}; let res=await apiCall('update_report.php','POST',{...data,id}); if(res.success){ showToast("Updated"); closeModal('editReportModal'); await loadReportsSection(); } }

function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
function showSection(s){ ["dashboard","bricks","timber","requests","reports","settings"].forEach(sec=>{ let el=document.getElementById(sec+"Section"); if(el) el.classList.add("hidden"); }); document.getElementById(s+"Section").classList.remove("hidden"); if(s==='dashboard') loadDashboard(); else if(s==='bricks') loadBricksProjectsSection(); else if(s==='timber') loadTimberProjectsSection(); else if(s==='requests') loadRequestsSection(); else if(s==='reports') loadReportsSection(); else if(s==='settings') document.getElementById("settingsSection").innerHTML="<div class='bg-white p-5 rounded-xl'><h3>Settings panel</h3><button onclick='localStorage.clear();location.reload()' class='bg-red-500 text-white p-2 rounded'>Reset</button></div>"; }
function init(){ let container=document.getElementById("mainContainer"); container.innerHTML=`<div id="dashboardSection"></div><div id="bricksSection" class="hidden"></div><div id="timberSection" class="hidden"></div><div id="requestsSection" class="hidden"></div><div id="reportsSection" class="hidden"></div><div id="settingsSection" class="hidden"></div><div id="projectModal" class="modal"><div class="modal-content p-5"><h3>Project</h3><input type="hidden" id="editProjectId"><input type="hidden" id="editProjectType"><input id="projectName" placeholder="Name" class="w-full border p-2 my-1"><input id="projectClient" placeholder="Client" class="w-full border p-2 my-1"><input id="projectAmount" placeholder="Amount" class="money-input w-full border p-2 my-1"><textarea id="projectDesc" placeholder="Description"></textarea><select id="projectStatus"><option>pending</option><option>in_progress</option><option>completed</option></select><input id="projectProgress" type="number" placeholder="Progress"><div class="flex gap-2 mt-3"><button onclick="saveProject()" class="bg-amber-600 text-white px-4 py-1 rounded">Save</button><button onclick="closeModal('projectModal')" class="bg-gray-300 px-4 py-1 rounded">Cancel</button></div></div></div><div id="addReportModal" class="modal"><div class="modal-content p-5"><h3>Add Report</h3><input id="newReportTitle" placeholder="Title" class="w-full border p-2 my-1"><select id="newReportPeriod"><option>daily</option><option>weekly</option><option>monthly</option></select><textarea id="newReportContent" rows="4" placeholder="Content"></textarea><button onclick="addReport()" class="bg-amber-600 text-white px-3 py-1 rounded mt-2">Save</button><button onclick="closeModal('addReportModal')">Cancel</button></div></div><div id="editReportModal" class="modal"><div class="modal-content p-5"><h3>Edit Report</h3><input id="editReportId" type="hidden"><input id="editReportTitle" class="w-full border p-2"><select id="editReportPeriod"><option>daily</option><option>weekly</option></select><textarea id="editReportContent" rows="4"></textarea><button onclick="updateReport()" class="bg-amber-600 text-white px-3 py-1 rounded">Update</button></div></div><div id="generateReportModal" class="modal"><div class="modal-content p-5"><h3>Generate Report</h3><input id="genReportTitle" placeholder="Title"><select id="genPeriodType"><option>daily</option><option>weekly</option><option>monthly</option></select><button onclick="generateAndSaveReport()">Generate</button></div></div>`; showSection('dashboard'); document.querySelectorAll(".nav-item").forEach(nav=>nav.addEventListener("click",(e)=>{ e.preventDefault(); showSection(nav.dataset.section); })); document.getElementById("logoutBtn")?.addEventListener("click",()=>{ localStorage.clear(); window.location.href="login_system.html"; }); document.getElementById("mobileMenuBtn")?.addEventListener("click",()=>document.getElementById("sidebar").classList.toggle("mobile-open")); document.getElementById("darkModeToggle")?.addEventListener("click",()=>{ document.body.classList.toggle("dark-mode"); localStorage.setItem("darkMode",document.body.classList.contains("dark-mode")); }); if(localStorage.getItem("darkMode")==="true") document.body.classList.add("dark-mode"); }
window.init=init; window.closeModal=closeModal; window.openModal=openModal; window.showSection=showSection; window.editRequestRecord=editRequestRecord; window.viewRequestDetails=viewRequestDetails; window.deleteRequestRecord=deleteRequestRecord; window.submitRequest=submitRequest; window.openProjectWorkModal=openProjectWorkModal; window.saveProjectWork=saveProjectWork; window.deleteWorkRecord=deleteWorkRecord; window.editWorkRecord=editWorkRecord; window.openAddProjectModal=openAddProjectModal; window.saveProject=saveProject; window.editProject=editProject; window.deleteProjectItem=deleteProjectItem; window.showReportList=showReportList; window.viewReportFull=viewReportFull; window.deleteReportItem=deleteReportItem; window.addReport=addReport; window.updateReport=updateReport; window.openGenerateReportModal=openGenerateReportModal; window.generateAndSaveReport=generateAndSaveReport; window.exportAllReportsExcel=exportAllReportsExcel; window.exportAllReportsPDF=exportAllReportsPDF; window.editReport=editReport;
init();
</script>
