<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GeoTraverse ERP - Login System</title>
    
    <!-- Favicon / Logo Icon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/MT6jTVHh/weblogo.png">
    <link rel="shortcut icon" type="image/png" href="https://i.postimg.cc/MT6jTVHh/weblogo.png">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        body.dark-mode {
            background: #020617;
        }
        
        .login-container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.4);
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            z-index: 1;
        }
        
        body.dark-mode .login-container {
            background: #1e293b;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .login-header {
            padding: 35px 30px 25px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            transition: background 0.5s ease;
        }
        
        .login-header.admin-header {
            background: #1e40af;
        }
        
        .login-header.dept-header {
            background: #059669;
        }
        
        .logo-wrapper {
            width: 88px;
            height: 88px;
            background: rgba(255,255,255,0.15);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            border: 2px solid rgba(255,255,255,0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        
        .logo-wrapper:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(0,0,0,0.3);
        }
        
        .logo-img {
            width: 54px;
            height: 54px;
            object-fit: contain;
        }
        
        .login-header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 4px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.15);
        }
        
        .login-header p {
            font-size: 13px;
            opacity: 0.85;
            font-weight: 300;
            letter-spacing: 0.3px;
        }
        
        .header-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .login-tabs {
            display: flex;
            padding: 0 8px;
            gap: 4px;
            background: #f1f5f9;
            margin: 8px 20px 0;
            border-radius: 16px;
        }
        
        body.dark-mode .login-tabs {
            background: #1e293b;
        }
        
        .tab-button {
            flex: 1;
            padding: 14px 12px;
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #94a3b8;
        }
        
        .tab-button i { font-size: 15px; }
        
        .tab-button.active {
            color: white;
            background: #1e40af;
            box-shadow: 0 4px 12px rgba(30,64,175,0.3);
        }
        
        .tab-button[data-tab="department"].active {
            background: #059669;
            box-shadow: 0 4px 12px rgba(5,150,105,0.3);
        }
        
        body.dark-mode .tab-button.active {
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        .tab-button:hover:not(.active) {
            background: rgba(0,0,0,0.05);
            color: #475569;
        }
        
        body.dark-mode .tab-button:hover:not(.active) {
            background: rgba(255,255,255,0.05);
            color: #94a3b8;
        }
        
        .tab-button .tab-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        
        .tab-button[data-tab="admin"] .tab-icon {
            background: rgba(59,130,246,0.15);
            color: #3b82f6;
        }
        
        .tab-button[data-tab="department"] .tab-icon {
            background: rgba(16,185,129,0.15);
            color: #10b981;
        }
        
        .tab-button.active .tab-icon {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .login-form {
            padding: 28px 30px 32px;
            display: none;
        }
        
        .login-form.active {
            display: block;
            animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .input-group {
            margin-bottom: 22px;
            position: relative;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        
        body.dark-mode .input-group label {
            color: #94a3b8;
        }
        
        .input-group .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            transition: all 0.3s ease;
        }
        
        body.dark-mode .input-group .input-wrapper {
            background: #0f172a;
            border-color: #334155;
        }
        
        .input-group .input-wrapper:focus-within {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }
        
        body.dark-mode .input-group .input-wrapper:focus-within {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(59,130,246,0.1);
        }
        
        #departmentForm .input-group .input-wrapper:focus-within {
            border-color: #059669;
            box-shadow: 0 0 0 4px rgba(5,150,105,0.1);
        }
        
        body.dark-mode #departmentForm .input-group .input-wrapper:focus-within {
            border-color: #34d399;
            box-shadow: 0 0 0 4px rgba(5,150,105,0.1);
        }
        
        .input-group .input-icon {
            padding: 0 0 0 16px;
            color: #94a3b8;
            font-size: 15px;
            transition: color 0.3s;
        }
        
        .input-group .input-wrapper:focus-within .input-icon {
            color: #3b82f6;
        }
        
        #departmentForm .input-group .input-wrapper:focus-within .input-icon {
            color: #059669;
        }
        
        body.dark-mode .input-group .input-wrapper:focus-within .input-icon {
            color: #60a5fa;
        }
        
        body.dark-mode #departmentForm .input-group .input-wrapper:focus-within .input-icon {
            color: #34d399;
        }
        
        .input-group input,
        .input-group select {
            flex: 1;
            padding: 14px 16px 14px 12px;
            font-size: 14px;
            background: transparent;
            border: none;
            outline: none;
            color: #1e293b;
            font-weight: 500;
        }
        
        body.dark-mode .input-group input,
        body.dark-mode .input-group select {
            color: #f1f5f9;
        }
        
        .input-group select {
            appearance: none;
            cursor: pointer;
        }
        
        .input-group select option {
            background: white;
            color: #1e293b;
        }
        
        body.dark-mode .input-group select option {
            background: #1e293b;
            color: #f1f5f9;
        }
        
        .password-toggle {
            padding: 0 16px 0 4px;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.3s;
            font-size: 16px;
        }
        
        .password-toggle:hover {
            color: #475569;
        }
        
        body.dark-mode .password-toggle:hover {
            color: #94a3b8;
        }
        
        .message-box {
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
        }
        
        .message-box.show {
            display: flex;
            animation: fadeIn 0.3s ease;
        }
        
        .message-box.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }
        
        body.dark-mode .message-box.error {
            background: rgba(220,38,38,0.15);
            color: #fca5a5;
            border-color: rgba(220,38,38,0.2);
        }
        
        .message-box.success {
            background: #f0fdf4;
            color: #059669;
            border: 1px solid #bbf7d0;
        }
        
        body.dark-mode .message-box.success {
            background: rgba(5,150,105,0.15);
            color: #34d399;
            border-color: rgba(5,150,105,0.2);
        }
        
        .message-box i {
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .login-btn {
            width: 100%;
            padding: 14px;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 6px;
            position: relative;
            overflow: hidden;
        }
        
        .login-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transition: left 0.6s;
        }
        
        .login-btn:hover::after {
            left: 100%;
        }
        
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .login-btn:disabled::after {
            display: none;
        }
        
        #adminLoginBtn {
            background: #1e40af;
            box-shadow: 0 4px 20px rgba(30,64,175,0.35);
        }
        
        #adminLoginBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(30,64,175,0.45);
            background: #1e3a8a;
        }
        
        #deptLoginBtn {
            background: #059669;
            box-shadow: 0 4px 20px rgba(5,150,105,0.35);
        }
        
        #deptLoginBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(5,150,105,0.45);
            background: #047857;
        }
        
        .login-footer {
            text-align: center;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        
        body.dark-mode .login-footer {
            border-top-color: #334155;
        }
        
        .login-footer a {
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
            transition: color 0.3s;
            cursor: pointer;
        }
        
        .login-footer a:hover {
            color: #3b82f6;
        }
        
        body.dark-mode .login-footer a:hover {
            color: #60a5fa;
        }
        
        .login-footer .divider {
            color: #cbd5e1;
            margin: 0 10px;
        }
        
        body.dark-mode .login-footer .divider {
            color: #475569;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.25);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.7s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .theme-toggle {
            position: fixed;
            top: 24px;
            right: 24px;
            width: 46px;
            height: 46px;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: all 0.3s ease;
            z-index: 100;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        body.dark-mode .theme-toggle {
            background: rgba(30,41,59,0.9);
            border-color: rgba(255,255,255,0.05);
            color: #f1f5f9;
        }
        
        .theme-toggle:hover {
            transform: scale(1.08) rotate(10deg);
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
        }
        
        .theme-toggle i {
            font-size: 18px;
            color: #475569;
        }
        
        body.dark-mode .theme-toggle i {
            color: #f1f5f9;
        }
        
        .toast-notification {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            color: white;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            animation: slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        
        .toast-notification.success {
            background: #059669;
        }
        
        .toast-notification.error {
            background: #dc2626;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeIn 0.3s ease;
        }
        
        .modal-content {
            background: white;
            border-radius: 28px;
            padding: 35px;
            max-width: 420px;
            width: 90%;
            animation: modalFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            position: relative;
        }
        
        body.dark-mode .modal-content {
            background: #1e293b;
        }
        
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        
        .modal-close {
            position: absolute;
            top: 16px;
            right: 20px;
            cursor: pointer;
            font-size: 22px;
            color: #94a3b8;
            transition: color 0.3s;
            background: none;
            border: none;
        }
        
        .modal-close:hover {
            color: #475569;
        }
        
        body.dark-mode .modal-close:hover {
            color: #f1f5f9;
        }
        
        .modal h3 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1e293b;
        }
        
        body.dark-mode .modal h3 {
            color: #f1f5f9;
        }
        
        .modal .modal-sub {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        
        body.dark-mode .modal .modal-sub {
            color: #94a3b8;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .modal-buttons button {
            flex: 1;
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        
        .modal-buttons .btn-primary {
            background: #1e40af;
            color: white;
            box-shadow: 0 4px 12px rgba(30,64,175,0.25);
        }
        
        .modal-buttons .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30,64,175,0.35);
            background: #1e3a8a;
        }
        
        .modal-buttons .btn-secondary {
            background: #f1f5f9;
            color: #475569;
        }
        
        .modal-buttons .btn-secondary:hover {
            background: #e2e8f0;
        }
        
        body.dark-mode .modal-buttons .btn-secondary {
            background: #334155;
            color: #f1f5f9;
        }
        
        body.dark-mode .modal-buttons .btn-secondary:hover {
            background: #475569;
        }
        
        @media (max-width: 520px) {
            .login-container { border-radius: 24px; }
            .login-header { padding: 28px 20px 20px; }
            .login-header h1 { font-size: 24px; }
            .login-form { padding: 20px; }
            .login-tabs { margin: 4px 12px 0; padding: 4px; }
            .tab-button { padding: 10px 8px; font-size: 12px; }
            .tab-button .tab-text { display: none; }
            .tab-button i { font-size: 17px; }
            .logo-wrapper { width: 72px; height: 72px; }
            .logo-img { width: 44px; height: 44px; }
            .theme-toggle { top: 16px; right: 16px; width: 40px; height: 40px; }
            .toast-notification { right: 16px; left: 16px; bottom: 16px; font-size: 13px; padding: 12px 18px; }
            .modal-content { padding: 24px 20px; }
        }
        
        @media (max-width: 380px) {
            .login-header h1 { font-size: 20px; }
            .login-form { padding: 16px; }
            .input-group input,
            .input-group select { padding: 12px 12px 12px 8px; font-size: 13px; }
        }
    </style>
</head>
<body>

<div class="theme-toggle" id="themeToggle" title="Toggle Dark/Light Mode">
    <i id="themeIcon" class="fas fa-moon"></i>
</div>

<div class="login-container" id="loginContainer">
    <div class="login-header admin-header" id="loginHeader">
        <div class="logo-wrapper">
            <img src="https://i.postimg.cc/MT6jTVHh/weblogo.png" 
                 alt="GeoTraverse Logo" 
                 class="logo-img"
                 onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%233b82f6%22/%3E%3Ctext x=%2250%22 y=%2265%22 text-anchor=%22middle%22 fill=%22white%22 font-size=%2240%22 font-weight=%22bold%22%3EG%3C/text%3E%3C/svg%3E'">
        </div>
        <h1>GeoTraverse ERP</h1>
        <p>Enterprise Resource Planning System</p>
        <div class="header-badge">Secure Login</div>
    </div>
    
    <div class="login-tabs" id="loginTabs">
        <button class="tab-button active" data-tab="admin" id="adminTab">
            <span class="tab-icon"><i class="fas fa-crown"></i></span>
            <span class="tab-text">Admin</span>
        </button>
        <button class="tab-button" data-tab="department" id="deptTab">
            <span class="tab-icon"><i class="fas fa-building"></i></span>
            <span class="tab-text">Department</span>
        </button>
    </div>
    
    <!-- Admin Login Form -->
    <div id="adminForm" class="login-form active">
        <div id="adminMessage" class="message-box">
            <i class="fas fa-info-circle"></i>
            <span id="adminMessageText"></span>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <div class="input-wrapper">
                <span class="input-icon"><i class="fas fa-envelope"></i></span>
                <input type="email" id="adminEmail" placeholder="admin@geotraverse.com" autocomplete="off">
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <div class="input-wrapper">
                <span class="input-icon"><i class="fas fa-lock"></i></span>
                <input type="password" id="adminPassword" placeholder="Enter your password">
                <span class="password-toggle" onclick="togglePassword('adminPassword')" title="Toggle password visibility">
                    <i class="fas fa-eye"></i>
                </span>
            </div>
        </div>
        
        <div style="text-align: right; margin: -8px 0 18px;">
            <a onclick="openForgotPasswordModal()" style="font-size: 12px; color: #64748b; cursor: pointer; transition: color 0.3s;">
                <i class="fas fa-key"></i> Forgot Password?
            </a>
        </div>
        
        <button class="login-btn" id="adminLoginBtn" onclick="loginAdmin()">
            <i class="fas fa-sign-in-alt"></i> Login as Admin
        </button>
        
        <div class="login-footer">
            <span style="font-size: 12px; color: #94a3b8;">
                <i class="fas fa-shield-alt"></i> Only Super Administrators
            </span>
        </div>
    </div>
    
    <!-- Department Login Form -->
    <div id="departmentForm" class="login-form">
        <div id="deptMessage" class="message-box">
            <i class="fas fa-info-circle"></i>
            <span id="deptMessageText"></span>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-building"></i> Select Department</label>
            <div class="input-wrapper">
                <span class="input-icon"><i class="fas fa-building"></i></span>
                <select id="deptSelect">
                    <option value="">-- Select Department --</option>
                </select>
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email Address</label>
            <div class="input-wrapper">
                <span class="input-icon"><i class="fas fa-envelope"></i></span>
                <input type="email" id="deptEmail" placeholder="department@geotraverse.com" autocomplete="off">
            </div>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <div class="input-wrapper">
                <span class="input-icon"><i class="fas fa-lock"></i></span>
                <input type="password" id="deptPassword" placeholder="Enter your password">
                <span class="password-toggle" onclick="togglePassword('deptPassword')" title="Toggle password visibility">
                    <i class="fas fa-eye"></i>
                </span>
            </div>
        </div>
        
        <button class="login-btn" id="deptLoginBtn" onclick="loginDepartment()">
            <i class="fas fa-sign-in-alt"></i> Login as Department
        </button>
        
        <div class="login-footer">
            <span style="font-size: 12px; color: #94a3b8;">
                <i class="fas fa-users"></i> For department heads and staff
            </span>
        </div>
    </div>
</div>

<!-- Forgot Password Modal -->
<div id="forgotPasswordModal" class="modal">
    <div class="modal-content">
        <button class="modal-close" onclick="closeForgotPasswordModal()">&times;</button>
        <h3><i class="fas fa-key" style="color: #3b82f6;"></i> Reset Admin Password</h3>
        <p class="modal-sub">Enter your admin email address and we'll send you a reset link.</p>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Admin Email</label>
            <div class="input-wrapper">
                <span class="input-icon"><i class="fas fa-envelope"></i></span>
                <input type="email" id="resetEmail" placeholder="admin@geotraverse.com">
            </div>
        </div>
        
        <div id="resetMessage" class="message-box">
            <i class="fas fa-info-circle"></i>
            <span id="resetMessageText"></span>
        </div>
        
        <div class="modal-buttons">
            <button class="btn-secondary" onclick="closeForgotPasswordModal()">Cancel</button>
            <button class="btn-primary" onclick="sendResetPassword()">Send Reset Link</button>
        </div>
    </div>
</div>

<script>
// ============================================================
// ==================== API CONFIGURATION ====================
// ============================================================
const API_BASE = '../backend/api/';

const departmentPages = {
    2: "finance.html",
    3: "sales_marketing.html",
    4: "manager.html",
    5: "secretary.html",
    6: "bricks_timber.html",
    7: "aluminium.html",
    8: "town_planning.html",
    9: "architectural.html",
    10: "survey.html",
    11: "construction.html",
    12: "hatimiliki.html"
};

const departmentNames = {
    2: "Finance", 3: "Sales & Marketing", 4: "Manager", 5: "Secretary",
    6: "Bricks & Timber", 7: "Aluminium", 8: "Town Planning", 9: "Architectural",
    10: "Survey", 11: "Construction", 12: "Hatimiliki"
};

// ============================================================
// ==================== TOAST NOTIFICATION ====================
// ============================================================
function showToast(message, isError = false) {
    const existingToast = document.querySelector('.toast-notification');
    if (existingToast) existingToast.remove();
    
    const toast = document.createElement('div');
    toast.className = 'toast-notification' + (isError ? ' error' : ' success');
    toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    
    setTimeout(() => {
        toast.style.animation = 'slideOutRight 0.3s ease';
        setTimeout(() => toast.remove(), 300);
    }, 4000);
}

// ============================================================
// ==================== MESSAGE BOX ====================
// ============================================================
function showMessage(boxId, textId, message, type) {
    const box = document.getElementById(boxId);
    const text = document.getElementById(textId);
    if (!box || !text) return;
    text.textContent = message;
    box.className = 'message-box show ' + type;
}

function hideMessage(boxId) {
    const box = document.getElementById(boxId);
    if (box) box.className = 'message-box';
}

// ============================================================
// ==================== PASSWORD TOGGLE ====================
// ============================================================
function togglePassword(fieldId) {
    const input = document.getElementById(fieldId);
    const icon = input.parentElement.querySelector('.password-toggle i');
    
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

// ============================================================
// ==================== LOAD DEPARTMENTS ====================
// ============================================================
async function loadDepartments() {
    const deptSelect = document.getElementById('deptSelect');
    
    try {
        const response = await fetch(API_BASE + 'get_departments.php');
        const result = await response.json();
        
        deptSelect.innerHTML = '<option value="">-- Select Department --</option>';
        
        if (result.success && result.data && result.data.length > 0) {
            const depts = result.data.filter(d => d.id !== 1);
            
            if (depts.length === 0) {
                deptSelect.innerHTML = '<option value="">-- No departments available --</option>';
                return;
            }
            
            depts.forEach(dept => {
                const name = dept.name || departmentNames[dept.id] || 'Department ' + dept.id;
                const icon = dept.id === 2 ? '💰' : 
                            dept.id === 3 ? '📊' : 
                            dept.id === 4 ? '👔' : 
                            dept.id === 5 ? '📋' : 
                            dept.id === 6 ? '🧱' : 
                            dept.id === 7 ? '🔧' : 
                            dept.id === 8 ? '🏙️' : 
                            dept.id === 9 ? '✏️' : 
                            dept.id === 10 ? '📍' : 
                            dept.id === 11 ? '🏗️' : 
                            dept.id === 12 ? '📜' : '🏢';
                deptSelect.innerHTML += `<option value="${dept.id}">${icon} ${name}</option>`;
            });
        } else {
            const fallbackDepts = [
                { id: 2, name: 'Finance' },
                { id: 3, name: 'Sales & Marketing' },
                { id: 4, name: 'Manager' },
                { id: 5, name: 'Secretary' },
                { id: 6, name: 'Bricks & Timber' },
                { id: 7, name: 'Aluminium' },
                { id: 8, name: 'Town Planning' },
                { id: 9, name: 'Architectural' },
                { id: 10, name: 'Survey' },
                { id: 11, name: 'Construction' },
                { id: 12, name: 'Hatimiliki' }
            ];
            fallbackDepts.forEach(dept => {
                deptSelect.innerHTML += `<option value="${dept.id}">${dept.name}</option>`;
            });
        }
    } catch (error) {
        console.error('Error loading departments:', error);
        const fallbackDepts = [
            { id: 2, name: 'Finance' },
            { id: 3, name: 'Sales & Marketing' },
            { id: 4, name: 'Manager' },
            { id: 5, name: 'Secretary' },
            { id: 6, name: 'Bricks & Timber' },
            { id: 7, name: 'Aluminium' },
            { id: 8, name: 'Town Planning' },
            { id: 9, name: 'Architectural' },
            { id: 10, name: 'Survey' },
            { id: 11, name: 'Construction' },
            { id: 12, name: 'Hatimiliki' }
        ];
        deptSelect.innerHTML = '<option value="">-- Select Department --</option>';
        fallbackDepts.forEach(dept => {
            deptSelect.innerHTML += `<option value="${dept.id}">${dept.name}</option>`;
        });
    }
}

// ============================================================
// ==================== SET LOADING STATE ====================
// ============================================================
function setLoading(buttonId, isLoading) {
    const btn = document.getElementById(buttonId);
    if (!btn) return;
    
    if (isLoading) {
        btn.innerHTML = '<span class="loading-spinner"></span> Processing...';
        btn.disabled = true;
    } else {
        if (buttonId === 'adminLoginBtn') {
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login as Admin';
        } else if (buttonId === 'deptLoginBtn') {
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login as Department';
        }
        btn.disabled = false;
    }
}

// ============================================================
// ==================== ADMIN LOGIN - WITH NETWORK DEBUG ====================
// ============================================================
async function loginAdmin() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    
    hideMessage('adminMessage');
    
    if (!email) {
        showMessage('adminMessage', 'adminMessageText', 'Please enter email address', 'error');
        return;
    }
    
    if (!password) {
        showMessage('adminMessage', 'adminMessageText', 'Please enter password', 'error');
        return;
    }
    
    setLoading('adminLoginBtn', true);
    
    try {
        const url = API_BASE + 'login.php';
        console.log('Sending request to:', url);
        console.log('Payload:', { email, password });
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ email, password })
        });
        
        console.log('Response status:', response.status);
        
        // Check if response is OK
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        // Try to parse JSON
        const text = await response.text();
        console.log('Raw response:', text);
        
        let result;
        try {
            result = JSON.parse(text);
        } catch (parseError) {
            console.error('JSON parse error:', parseError);
            throw new Error('Server returned invalid response');
        }
        
        console.log('Parsed response:', result);
        
        if (result.success && result.user) {
            const isAdmin = result.user.role === 'Super Administrator' || 
                           result.user.role === 'Admin' ||
                           result.user.is_admin === 1 ||
                           result.user.department_id === 1;
            
            if (isAdmin) {
                showMessage('adminMessage', 'adminMessageText', '✅ Login successful! Redirecting...', 'success');
                showToast('✅ Login successful!');
                
                setTimeout(() => {
                    window.location.href = result.redirect || 'super_admin.html';
                }, 1200);
            } else {
                showMessage('adminMessage', 'adminMessageText', '❌ You do not have Admin privileges.', 'error');
                showToast('❌ Admin privileges required', true);
                setLoading('adminLoginBtn', false);
            }
        } else {
            showMessage('adminMessage', 'adminMessageText', result.message || '❌ Invalid credentials', 'error');
            showToast(result.message || 'Login failed', true);
            setLoading('adminLoginBtn', false);
        }
    } catch (error) {
        console.error('Login error:', error);
        
        // Show detailed error
        let errorMsg = 'Network error. Please check your connection.';
        if (error.message) {
            errorMsg = error.message;
        }
        
        showMessage('adminMessage', 'adminMessageText', '❌ ' + errorMsg, 'error');
        showToast('❌ ' + errorMsg, true);
        setLoading('adminLoginBtn', false);
    }
}
// ============================================================
// ==================== DEPARTMENT LOGIN ====================
// ============================================================
async function loginDepartment() {
    const deptId = document.getElementById('deptSelect').value;
    const email = document.getElementById('deptEmail').value.trim();
    const password = document.getElementById('deptPassword').value;
    
    hideMessage('deptMessage');
    
    if (!deptId) {
        showMessage('deptMessage', 'deptMessageText', 'Please select a department', 'error');
        return;
    }
    
    if (!email) {
        showMessage('deptMessage', 'deptMessageText', 'Please enter email address', 'error');
        return;
    }
    
    if (!password) {
        showMessage('deptMessage', 'deptMessageText', 'Please enter password', 'error');
        return;
    }
    
    setLoading('deptLoginBtn', true);
    
    try {
        const url = API_BASE + 'login.php';
        console.log('Sending request to:', url);
        console.log('Payload:', { email, password, department_id: parseInt(deptId) });
        
        const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ 
                email, 
                password, 
                department_id: parseInt(deptId) 
            })
        });
        
        console.log('Response status:', response.status);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const text = await response.text();
        console.log('Raw response:', text);
        
        let result;
        try {
            result = JSON.parse(text);
        } catch (parseError) {
            console.error('JSON parse error:', parseError);
            throw new Error('Server returned invalid response');
        }
        
        console.log('Parsed response:', result);
        
        if (result.success && result.user) {
            const userDeptId = result.user.department_id || 0;
            
            if (userDeptId == deptId) {
                const deptName = departmentNames[deptId] || 'Department';
                showMessage('deptMessage', 'deptMessageText', `✅ Login successful! Redirecting to ${deptName} Dashboard...`, 'success');
                showToast(`✅ Welcome to ${deptName}!`);
                
                setTimeout(() => {
                    const page = departmentPages[deptId] || 'dashboard.html';
                    window.location.href = page;
                }, 1200);
            } else {
                showMessage('deptMessage', 'deptMessageText', '❌ Department mismatch.', 'error');
                showToast('❌ Department mismatch', true);
                setLoading('deptLoginBtn', false);
            }
        } else {
            showMessage('deptMessage', 'deptMessageText', result.message || '❌ Invalid credentials', 'error');
            showToast(result.message || 'Login failed', true);
            setLoading('deptLoginBtn', false);
        }
    } catch (error) {
        console.error('Login error:', error);
        let errorMsg = 'Network error. Please check your connection.';
        if (error.message) {
            errorMsg = error.message;
        }
        showMessage('deptMessage', 'deptMessageText', '❌ ' + errorMsg, 'error');
        showToast('❌ ' + errorMsg, true);
        setLoading('deptLoginBtn', false);
    }
}
// ============================================================
// ==================== CHECK SESSION ====================
// ============================================================
async function checkSession() {
    try {
        const response = await fetch(API_BASE + 'check_session.php', {
            method: 'GET',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include'
        });
        
        const result = await response.json();
        
        console.log('Session Check:', result);
        
        if (result.success && result.logged_in) {
            if (result.is_admin || result.role === 'Super Administrator') {
                window.location.href = 'super_admin.html';
            } else if (result.department_id && departmentPages[result.department_id]) {
                window.location.href = result.redirect || departmentPages[result.department_id];
            }
        }
    } catch (error) {
        console.error('Session check error:', error);
    }
}

// ============================================================
// ==================== FORGOT PASSWORD ====================
// ============================================================
function openForgotPasswordModal() {
    document.getElementById('resetEmail').value = '';
    hideMessage('resetMessage');
    document.getElementById('forgotPasswordModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeForgotPasswordModal() {
    document.getElementById('forgotPasswordModal').style.display = 'none';
    document.body.style.overflow = '';
}

async function sendResetPassword() {
    const email = document.getElementById('resetEmail').value.trim();
    hideMessage('resetMessage');
    
    if (!email) {
        showMessage('resetMessage', 'resetMessageText', 'Please enter admin email address', 'error');
        return;
    }
    
    const btn = document.querySelector('#forgotPasswordModal .btn-primary');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="loading-spinner"></span> Sending...';
    btn.disabled = true;
    
    try {
        const response = await fetch(API_BASE + 'forgot_password.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, user_type: 'admin' })
        });
        
        const result = await response.json();
        
        if (result.success) {
            showMessage('resetMessage', 'resetMessageText', result.message || 'Reset link sent successfully!', 'success');
            showToast('Reset link sent!');
            
            setTimeout(() => {
                closeForgotPasswordModal();
            }, 3000);
        } else {
            showMessage('resetMessage', 'resetMessageText', result.message || 'Failed to reset password', 'error');
            showToast(result.message || 'Failed', true);
        }
    } catch (error) {
        console.error('Reset password error:', error);
        showMessage('resetMessage', 'resetMessageText', 'Network error. Please try again.', 'error');
        showToast('Network error', true);
    } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
}

// ============================================================
// ==================== TAB SWITCHING ====================
// ============================================================
const adminForm = document.getElementById('adminForm');
const deptForm = document.getElementById('departmentForm');
const loginHeader = document.getElementById('loginHeader');
const adminTab = document.getElementById('adminTab');
const deptTab = document.getElementById('deptTab');

function switchTab(tab) {
    adminTab.classList.toggle('active', tab === 'admin');
    deptTab.classList.toggle('active', tab === 'department');
    
    adminForm.classList.toggle('active', tab === 'admin');
    deptForm.classList.toggle('active', tab === 'department');
    
    if (tab === 'admin') {
        loginHeader.className = 'login-header admin-header';
    } else {
        loginHeader.className = 'login-header dept-header';
    }
    
    hideMessage('adminMessage');
    hideMessage('deptMessage');
}

adminTab.addEventListener('click', () => switchTab('admin'));
deptTab.addEventListener('click', () => switchTab('department'));

loginHeader.className = 'login-header admin-header';

// ============================================================
// ==================== DARK MODE TOGGLE ====================
// ============================================================
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');

if (localStorage.getItem('login_dark_mode') === 'true') {
    document.body.classList.add('dark-mode');
    themeIcon.classList.remove('fa-moon');
    themeIcon.classList.add('fa-sun');
}

themeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');
    const isDark = document.body.classList.contains('dark-mode');
    localStorage.setItem('login_dark_mode', isDark);
    
    if (isDark) {
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
    } else {
        themeIcon.classList.remove('fa-sun');
        themeIcon.classList.add('fa-moon');
    }
});

// ============================================================
// ==================== ENTER KEY SUPPORT ====================
// ============================================================
document.getElementById('adminPassword')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') loginAdmin();
});

document.getElementById('deptPassword')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') loginDepartment();
});

document.getElementById('resetEmail')?.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') sendResetPassword();
});

// ============================================================
// ==================== CLOSE MODAL ON OUTSIDE CLICK ====================
// ============================================================
window.onclick = function(event) {
    const modal = document.getElementById('forgotPasswordModal');
    if (event.target === modal) {
        closeForgotPasswordModal();
    }
}

// ============================================================
// ==================== INIT ====================
// ============================================================
loadDepartments();
checkSession();

// Expose functions globally
window.togglePassword = togglePassword;
window.loginAdmin = loginAdmin;
window.loginDepartment = loginDepartment;
window.openForgotPasswordModal = openForgotPasswordModal;
window.closeForgotPasswordModal = closeForgotPasswordModal;
window.sendResetPassword = sendResetPassword;
window.showToast = showToast;
</script>
</body>
